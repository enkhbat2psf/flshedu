// ─── OMR SCANNER PAGE ─────────────────────────────────────────────────────────
function OMRScannerPage({ exam, onBack, onSubmit }) {
  const [tab, setTab] = useState('scan');
  const [cvReady, setCvReady] = useState(false);
  const [cvErr, setCvErr] = useState('');
  const [scanning, setScanning] = useState(false);
  const [processing, setProcessing] = useState(false);
  const [err, setErr] = useState('');
  const [answerKey, setAnswerKey] = useState(() => {
    try {
      const raw = localStorage.getItem('se_omr_key_' + exam.id);
      if (raw) return JSON.parse(raw);
    } catch {}
    return omrDefaultAnswerKey();
  });
  const [keyText, setKeyText] = useState(() => answerKeyToText(answerKey));
  const [studentName, setStudentName] = useState('');
  const [studentClass, setStudentClass] = useState('');
  const [lastResult, setLastResult] = useState(null);
  const [showFlash, setShowFlash] = useState(false);
  const [previewUrl, setPreviewUrl] = useState('');

  const videoRef = useRef(null);
  const canvasRef = useRef(null);
  const streamRef = useRef(null);
  const scanLoopRef = useRef(null);
  const lastAnswersRef = useRef(null);
  const stableCountRef = useRef(0);

  useEffect(() => {
    loadOpenCv().then(() => setCvReady(true)).catch(e => setCvErr(e.message));
    return () => stopCamera();
  }, []);

  useEffect(() => {
    try { localStorage.setItem('se_omr_key_' + exam.id, JSON.stringify(answerKey)); } catch {}
    const db = getDb();
    if (db) {
      try { roomRef(db, exam.id).child('omrAnswerKey').set(answerKey); } catch {}
    }
  }, [answerKey, exam.id]);

  const stopCamera = () => {
    if (scanLoopRef.current) { cancelAnimationFrame(scanLoopRef.current); scanLoopRef.current = null; }
    if (streamRef.current) {
      streamRef.current.getTracks().forEach(t => t.stop());
      streamRef.current = null;
    }
    setScanning(false);
  };

  const startCamera = async () => {
    setErr('');
    stopCamera();
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      });
      streamRef.current = stream;
      if (videoRef.current) {
        videoRef.current.srcObject = stream;
        await videoRef.current.play();
      }
      setScanning(true);
      stableCountRef.current = 0;
      lastAnswersRef.current = null;
    } catch (e) {
      setErr('Камер нээхэд алдаа: ' + (e.message || 'зөвшөөрөл өгнө үү'));
    }
  };

  const applyKeyText = () => {
    setAnswerKey(parseAnswerKeyText(keyText));
  };

  const finalizeScan = useCallback((answers) => {
    const keyFilled = Object.values(answerKey).filter(Boolean).length;
    if (keyFilled < OMR_Q_COUNT) {
      setErr('Эхлээд бүх 20 асуултын зөв хариултыг тохируулна уу (Түлхүүр таб).');
      setTab('key');
      return;
    }
    const graded = gradeOMRAnswers(answers, answerKey);
    if (navigator.vibrate) navigator.vibrate([120, 60, 120]);
    setLastResult(graded);
    setShowFlash(true);
    setTimeout(() => setShowFlash(false), 1400);

    const sub = saveOMRSubmission(exam.id, {
      studentName: studentName.trim() || 'OMR ' + new Date().toLocaleTimeString('mn-MN'),
      studentClass: studentClass.trim(),
      answers,
      answerKey: { ...answerKey },
      score: graded.score,
      correctCount: graded.correct,
      totalCount: graded.total,
      cheatLog: [],
      timeSpentSec: 0,
      variantLabel: 'OMR'
    });
    onSubmit?.(sub);
  }, [answerKey, exam.id, studentName, studentClass, onSubmit]);

  const captureAndProcess = useCallback(async () => {
    if (!cvReady || !videoRef.current || !canvasRef.current) return;
    const video = videoRef.current;
    const canvas = canvasRef.current;
    if (video.readyState < 2) return;

    setProcessing(true);
    setErr('');
    try {
      const cv = await loadOpenCv();
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0);
      const result = processOMRFrame(cv, canvas);
      if (!result.ok) {
        setErr(result.error);
        stableCountRef.current = 0;
        return;
      }
      setPreviewUrl(result.previewDataUrl || '');

      const sig = JSON.stringify(result.answers);
      if (sig === lastAnswersRef.current) stableCountRef.current++;
      else { lastAnswersRef.current = sig; stableCountRef.current = 1; }

      if (stableCountRef.current >= 2) {
        stopCamera();
        finalizeScan(result.answers);
      }
    } catch (e) {
      setErr(e.message || 'Боловсруулахад алдаа');
    } finally {
      setProcessing(false);
    }
  }, [cvReady, finalizeScan]);

  useEffect(() => {
    if (!scanning || !cvReady) return;
    const id = setInterval(() => {
      if (!processing) captureAndProcess();
    }, 650);
    return () => clearInterval(id);
  }, [scanning, cvReady, processing, captureAndProcess]);

  useEffect(() => {
    const db = getDb();
    if (!db || !exam?.id) return;
    try {
      roomRef(db, exam.id).child('omrAnswerKey').once('value', snap => {
        const v = snap.val();
        if (v && typeof v === 'object') {
          setAnswerKey({ ...omrDefaultAnswerKey(), ...v });
          setKeyText(answerKeyToText({ ...omrDefaultAnswerKey(), ...v }));
        }
      });
    } catch {}
  }, [exam?.id]);

  const setKeyForQuestion = (q, letter) => {
    setAnswerKey(prev => {
      const next = { ...prev, [q]: letter };
      setKeyText(answerKeyToText(next));
      return next;
    });
  };

  return (
    <div className="omr-scanner-page">
      {showFlash && lastResult && (
        <div className="omr-result-flash">
          <div className="omr-result-box">
            <div className="big">{lastResult.correct}/{lastResult.total}</div>
            <div style={{ fontSize: '1.2rem', fontWeight: 700 }}>зөв бөглөлөө</div>
            <div style={{ marginTop: 8, opacity: 0.9 }}>{lastResult.score}%</div>
          </div>
        </div>
      )}

      <div className="page-header">
        <div className="container-lg" style={{ display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap' }}>
          <button className="btn btn-ghost btn-sm" onClick={() => { stopCamera(); onBack(); }}>← Буцах</button>
          <div>
            <h2 className="page-title">📷 OMR Сканер</h2>
            <div className="page-sub">{exam.title} · ZipGrade маягийн цаас уншигч</div>
          </div>
        </div>
      </div>

      <div className="container-lg" style={{ paddingBottom: 40 }}>
        <div style={{ display: 'flex', gap: 8, marginBottom: 16, flexWrap: 'wrap' }}>
          {[
            ['scan', '📷 Сканердах'],
            ['key', '🔑 Зөв хариулт'],
            ['print', '🖨 Хуудас хэвлэх']
          ].map(([id, lbl]) => (
            <button key={id} className={`btn btn-sm ${tab === id ? 'btn-violet' : 'btn-outline'}`} onClick={() => setTab(id)}>{lbl}</button>
          ))}
        </div>

        {!cvReady && !cvErr && <div className="card mb-3"><div className="card-body">⏳ OpenCV.js ачаалж байна...</div></div>}
        {cvErr && <div className="card mb-3"><div className="card-body" style={{ color: 'var(--red)' }}>⚠ {cvErr}</div></div>}

        {tab === 'print' && (
          <div>
            <div className="no-print" style={{ marginBottom: 12 }}>
              <button className="btn btn-primary" onClick={() => window.print()}>🖨 Хэвлэх / PDF хадгалах</button>
            </div>
            <div className="omr-print-wrap">
              <OMRAnswerSheet examTitle={exam.title} examId={exam.id} />
            </div>
          </div>
        )}

        {tab === 'key' && (
          <div className="card">
            <div className="card-header"><div className="card-title">🔑 Зөв хариултын түлхүүр (20 асуулт)</div></div>
            <div className="card-body">
              <div className="form-group">
                <label className="form-label">Богино формат (1-A, 2-B, 3-C...)</label>
                <textarea
                  className="form-textarea"
                  rows={3}
                  placeholder="1-A, 2-B, 3-C, 4-D, 5-A ..."
                  value={keyText}
                  onChange={e => setKeyText(e.target.value)}
                  onBlur={applyKeyText}
                />
                <button className="btn btn-outline btn-sm" style={{ marginTop: 8 }} onClick={applyKeyText}>Түлхүүр хэрэгжүүлэх</button>
              </div>
              <div className="omr-key-grid">
                {Array.from({ length: OMR_Q_COUNT }, (_, i) => {
                  const q = i + 1;
                  return (
                    <div key={q} className="omr-key-row">
                      <label>{q}.</label>
                      {OMR_OPTS.map(o => (
                        <button
                          key={o}
                          type="button"
                          className={`btn btn-sm ${answerKey[q] === o ? 'btn-violet' : 'btn-outline'}`}
                          style={{ minWidth: 36, padding: '4px 8px' }}
                          onClick={() => setKeyForQuestion(q, o)}
                        >{o}</button>
                      ))}
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}

        {tab === 'scan' && (
          <div className="card">
            <div className="card-body">
              <div className="form-row" style={{ marginBottom: 16 }}>
                <div className="form-group">
                  <label className="form-label">Сурагчийн нэр (сонголттой)</label>
                  <input className="form-input" value={studentName} onChange={e => setStudentName(e.target.value)} placeholder="Хадгалахад хэрэглэнэ" />

                <div className="form-group">

                  <input className="form-input" value={studentClass} onChange={e => setStudentClass(e.target.value)} placeholder="жн: 7а" />

              </div>

              <div className="omr-scan-stage">
                <video ref={videoRef} className="omr-scan-video" playsInline muted />

              </div>
              <canvas ref={canvasRef} style={{ display: 'none' }} />

              {err && <div className="form-error" style={{ marginTop: 12 }}>⚠ {err}</div>}
              {processing && <div style={{ marginTop: 8, color: 'var(--violet)', fontWeight: 600 }}>⏳ OpenCV боловсруулж байна...</div>}

              <div style={{ display: 'flex', gap: 10, marginTop: 16, flexWrap: 'wrap' }}>
                {!scanning ? (
                  <button className="btn btn-violet btn-lg" disabled={!cvReady} onClick={startCamera}>📷 Сканердах</button>

                  <>
                    <button className="btn btn-green btn-lg" disabled={processing} onClick={captureAndProcess}>⚡ Одоо унших</button>
                    <button className="btn btn-outline" onClick={stopCamera}>Камер хаах</button>
                  </>
                )}
              </div>
              <div style={{ fontSize: '0.8rem', color: 'var(--text3)', marginTop: 10 }}>
                Автомат: ижил хариулт 2 удаа тогтвортой бол уншина. Амжилттай бол чичирнэ.
              </div>

              {previewUrl && <img src={previewUrl} alt="warped" className="omr-preview-img" />}

              {lastResult && (
                <div style={{ marginTop: 16, padding: 16, background: 'var(--green-light)', borderRadius: 12, border: '1px solid #a7f3d0' }}>
                  <strong style={{ color: 'var(--green)' }}>Сүүлийн үр дүн: {lastResult.correct}/{lastResult.total} ({lastResult.score}%)</strong>
                  <span style={{ marginLeft: 8, fontSize: '0.85rem', color: 'var(--text2)' }}>Firebase-д хадгалагдсан</span>
                </div>
              )}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── STUDENT PORTAL ───────────────────────────────────────────────────────────
function StudentPortal({ onStartExam, onBack }) {
  const [name, setName] = useState(() => {
    try { return localStorage.getItem('se_student_name') || ''; } catch { return ''; }
  });
  const [cls, setCls] = useState(() => {
    try { return localStorage.getItem('se_student_class') || ''; } catch { return ''; }
  });
  const [code, setCode] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);

  const handleStart = async () => {
    if (!name.trim()) { setErr('Нэрээ оруулна уу'); return; }
    if (!cls.trim()) { setErr('Ангиа оруулна уу (жн: 7а)'); return; }
    if (!code.trim()) { setErr('Тестийн код оруулна уу'); return; }
    setLoading(true);
    setErr('');
    try {
      const roomExam = await fetchExamRoomByCode(code.trim());
      try {
        localStorage.setItem('se_student_name', name.trim());
        localStorage.setItem('se_student_class', cls.trim());
      } catch {}
      announceStudentJoin(roomExam.roomID, name.trim(), cls.trim());
      onStartExam(roomExam, name.trim(), cls.trim());
    } catch (e) {
      setErr(e.message || 'Алдаа гарлаа');
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="modal-overlay">
      <div className="modal" style={{ maxWidth: 440 }}>
        <div className="modal-head">
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <span style={{ fontSize: '1.4rem' }}>🎓</span>
            <div>
              <div style={{ fontFamily: 'Outfit', fontWeight: 800, fontSize: '1.1rem' }}>Сурагч — Шалгалтад орох</div>
              <div style={{ fontSize: '0.8rem', color: 'var(--text2)' }}>Нэр, анги, багшийн код</div>
            </div>
          </div>
        </div>
        <div className="modal-body">
          <div style={{ background: 'var(--violet-light)', borderRadius: 10, padding: '12px 14px', marginBottom: 16, fontSize: '0.85rem', color: '#4c3db0', lineHeight: 1.55 }}>
            Багш танд <strong>тестийн код</strong> өгнө. Доор нэр, анги, кодоо бичээд шууд шалгалтаа эхэлнэ.
          </div>
          <div className="form-group">
            <label className="form-label">Таны нэр</label>
            <input
              className="form-input"
              placeholder="Бүтэн нэр"
              value={name}
              onChange={e => { setName(e.target.value); setErr(''); }}
              autoFocus
            />
          </div>
          <div className="form-group">
            <label className="form-label">Анги</label>
            <input
              className="form-input"
              placeholder="жн: 7а, 8б, 9а"
              value={cls}
              onChange={e => { setCls(e.target.value); setErr(''); }}
            />
          </div>
          <div className="form-group">
            <label className="form-label">🔑 Тестийн код (багшийн өгсөн)</label>
            <input
              className="form-input"
              style={{ fontSize: '0.95rem', letterSpacing: 0.5, fontFamily: 'monospace' }}
              placeholder="Кодыг хуулж тавина уу"
              value={code}
              onChange={e => { setCode(e.target.value); setErr(''); }}
              onKeyDown={e => e.key === 'Enter' && !loading && handleStart()}
            />
          </div>
          {err && <div className="form-error">⚠ {err}</div>}
          {loading && (
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginTop: 8, color: 'var(--violet)' }}>
              <div className="spinner" style={{ width: 22, height: 22, borderWidth: 3 }} />
              <span style={{ fontWeight: 600 }}>Шалгалт ачаалж байна...</span>
            </div>
          )}
        </div>
        <div className="modal-foot">
          <button className="btn btn-ghost" onClick={onBack} disabled={loading}>← Буцах</button>
          <button
            className="btn btn-violet btn-lg"
            onClick={handleStart}
            disabled={loading || !name.trim() || !cls.trim() || !code.trim()}
          >
            {loading ? '⏳ ...' : '▶ Шалгалтад орох'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── EXAM TAKER ───────────────────────────────────────────────────────────────
function ExamTaker({ exam, studentName, studentClass, onSubmit, onBack }) {
  const [answers, setAnswers] = useState({});
  const [timeLeft, setTimeLeft] = useState(exam.duration * 60);
  const [submitted, setSubmitted] = useState(false);
  const [showConfirm, setShowConfirm] = useState(false);
  const [cheatLog, setCheatLog] = useState([]);
  const [cheatWarning, setCheatWarning] = useState('');
  const [showFlash, setShowFlash] = useState(false);
  const [stoppedNow, setStoppedNow] = useState(false);
  const submittedRef = useRef(false);
  const cheatLogRef = useRef([]);
  const startMsRef = useRef(Date.now());

  const orderedQuestions = useMemo(() => exam.questions || [], [exam]);

  const cheatArmedRef = useRef(false);
  const cheatGraceUntilRef = useRef(Date.now() + 5000);
  const cheatLastLogRef = useRef(0);
  const hiddenAtRef = useRef(0);
  const blurAtRef = useRef(0);
  const splitCheckTimerRef = useRef(null);

  const logCheat = useCallback((type, detail) => {
    if (submittedRef.current || !cheatArmedRef.current) return;
    if (Date.now() < cheatGraceUntilRef.current) return;
    const now = Date.now();
    if (now - cheatLastLogRef.current < 3000) return;
    cheatLastLogRef.current = now;
    const entry = { type, detail, time: new Date().toISOString() };
    cheatLogRef.current = [...cheatLogRef.current, entry];
    setCheatLog([...cheatLogRef.current]);
    setCheatWarning(detail);
    setShowFlash(true);
    setTimeout(() => setCheatWarning(''), 3500);
    setTimeout(() => setShowFlash(false), 400);
  }, []);

  // Шалгалт эхэлсний дараа л чит хяналт идэвхжинэ (эхний 5 сек — zoom/focus алдаа)
  useEffect(() => {
    cheatArmedRef.current = false;
    cheatGraceUntilRef.current = Date.now() + 5000;
    const arm = setTimeout(() => { cheatArmedRef.current = true; }, 5000);
    const meta = document.querySelector('meta[name="viewport"]');
    const prevVp = meta?.getAttribute('content') || '';
    if (meta) {
      meta.setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no');
    }
    return () => {
      clearTimeout(arm);
      if (meta && prevVp) meta.setAttribute('content', prevVp);
    };
  }, []);

  // Timer
  useEffect(() => {
    if (submitted) return;
    const t = setInterval(() => {
      setTimeLeft(s => {
        if (s <= 1) { clearInterval(t); doSubmit({}); return 0; }
        return s - 1;
      });
    }, 1000);
    return () => clearInterval(t);
  }, [submitted]);

  // Anti-cheat: таб солих — зөвхөн буцаж ирэхэд, ≥0.8 сек гадуур байсан бол
  useEffect(() => {
    const onVis = () => {
      if (document.hidden) {
        hiddenAtRef.current = Date.now();
        return;
      }
      if (!hiddenAtRef.current) return;
      const awayMs = Date.now() - hiddenAtRef.current;
      hiddenAtRef.current = 0;
      if (awayMs >= 800) {
        logCheat('TAB_SWITCH', '🔀 Өөр таб/апп руу ' + Math.round(awayMs / 1000) + ' сек орсон');
      }
    };
    document.addEventListener('visibilitychange', onVis);
    return () => document.removeEventListener('visibilitychange', onVis);
  }, [logCheat]);

  // Anti-cheat: blur — zoom UI, түр focus алдалт биш; ≥2 сек + таб нуугдаагүй үед л
  useEffect(() => {
    const onBlur = () => { if (!document.hidden) blurAtRef.current = Date.now(); };
    const onFocus = () => {
      if (!blurAtRef.current || document.hidden) { blurAtRef.current = 0; return; }
      const awayMs = Date.now() - blurAtRef.current;
      blurAtRef.current = 0;
      if (awayMs >= 2000) {
        logCheat('WINDOW_BLUR', '👁 Шалгалтын цонхноос ' + Math.round(awayMs / 1000) + ' сек гарсан');
      }
    };
    window.addEventListener('blur', onBlur);
    window.addEventListener('focus', onFocus);
    return () => {
      window.removeEventListener('blur', onBlur);
      window.removeEventListener('focus', onFocus);
    };
  }, [logCheat]);

  // Anti-cheat: copy
  useEffect(() => {
    const onCopy = () => logCheat('COPY', '📋 Текст хуулсан');
    document.addEventListener('copy', onCopy);
    return () => document.removeEventListener('copy', onCopy);
  }, [logCheat]);

  // Anti-cheat: right click
  useEffect(() => {
    const onRC = e => { e.preventDefault(); logCheat('RIGHT_CLICK', '🖱 Баруун товчлуур');
    };
    document.addEventListener('contextmenu', onRC);
    return () => document.removeEventListener('contextmenu', onRC);
  }, [logCheat]);

  // Anti-cheat: Translate — хуудас дээр class нэмэгдсэн үед л (түр биш)
  useEffect(() => {
    let translateTimer = null;
    const obs = new MutationObserver(() => {
      const cls = document.documentElement.className || '';
      if (!cls.includes('translated')) return;
      if (translateTimer) return;
      translateTimer = setTimeout(() => {
        translateTimer = null;
        if ((document.documentElement.className || '').includes('translated')) {
          logCheat('TRANSLATE', '🌐 Хуудас орчуулагдсан (Translate)');
        }
      }, 1500);
    });
    obs.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
    return () => { obs.disconnect(); if (translateTimer) clearTimeout(translateTimer); };
  }, [logCheat]);

  // Anti-cheat: split-screen — zoom биш; жижиг цонх 2+ сек тогтвортой байвал л
  useEffect(() => {
    let vpLast = {
      w: window.visualViewport?.width ?? window.innerWidth,
      h: window.visualViewport?.height ?? window.innerHeight,
      scale: window.visualViewport?.scale ?? 1
    };

    const measureViewport = () => {
      const vp = window.visualViewport;
      const w = vp?.width ?? window.innerWidth;
      const h = vp?.height ?? window.innerHeight;
      const scale = vp?.scale ?? 1;
      const sw = window.screen?.width || w;
      const sh = window.screen?.height || h;
      return { w, h, scale, ratioW: w / sw, ratioH: h / sh };
    };

    const scheduleSplitCheck = () => {
      if (splitCheckTimerRef.current) clearTimeout(splitCheckTimerRef.current);
      splitCheckTimerRef.current = setTimeout(() => {
        splitCheckTimerRef.current = null;
        const { ratioW, ratioH } = measureViewport();
        if (ratioW < 0.58 && ratioH < 0.58) {
          logCheat('SPLIT_SCREEN', '🪟 Дэлгэц хуваасан эсвэл цонх маш жижигрүүлсэн');
        }
      }, 2200);
    };

    const onViewportChange = () => {
      const m = measureViewport();
      const dw = Math.abs(m.w - vpLast.w);
      const dh = Math.abs(m.h - vpLast.h);
      const dScale = Math.abs(m.scale - vpLast.scale);
      vpLast = { w: m.w, h: m.h, scale: m.scale };

      // Pinch / browser zoom — scale өөрчлөгдвөл чит биш
      if (dScale > 0.04) return;
      if (dw + dh < 90) return;

      if (m.ratioW < 0.58 && m.ratioH < 0.58) scheduleSplitCheck();
      else if (splitCheckTimerRef.current) {
        clearTimeout(splitCheckTimerRef.current);
        splitCheckTimerRef.current = null;
      }
    };

    const vp = window.visualViewport;
    if (vp) {
      vp.addEventListener('resize', onViewportChange);
      vp.addEventListener('scroll', onViewportChange);
    }
    window.addEventListener('resize', onViewportChange);
    return () => {
      if (vp) {
        vp.removeEventListener('resize', onViewportChange);
        vp.removeEventListener('scroll', onViewportChange);
      }
      window.removeEventListener('resize', onViewportChange);
      if (splitCheckTimerRef.current) clearTimeout(splitCheckTimerRef.current);
    };
  }, [logCheat]);

  // Teacher force-stop (Firebase room flag)
  useEffect(() => {
    const db = getDb();
    if (!db || !exam?.id) return;
    try {
      const ref = roomRef(db, exam.id).child('stopped');
      const handler = ref.on('value', (snap) => {
        if (submittedRef.current) return;
        if (snap.val() === true) {
          setStoppedNow(true);
          logCheat('FORCE_STOP', '⏹ Багш шалгалтыг зогсоосон');
          // Auto-submit current answers (best-effort)
          setTimeout(() => doSubmit({}), 350);
        }
      });
      return () => { try { ref.off('value', handler); } catch {} };
    } catch {}
  }, [exam?.id, logCheat]);

  const doSubmit = useCallback((extraAnswers) => {
    if (submittedRef.current) return;
    submittedRef.current = true;
    const ans = { ...answers, ...extraAnswers };
    const qs = orderedQuestions.filter(q => q.answer);
    const correct = qs.filter(q => ans[q.id] === q.answer).length;
    const total = qs.length || orderedQuestions.length;
    const score = total > 0 ? Math.round((correct / total) * 100) : 0;
    const timeSpentSec = Math.round((Date.now() - startMsRef.current) / 1000);
    setSubmitted(true);
    const submission = {
      id: uid(),
      examId: exam.id,
      studentName,
      studentClass,
      answers: ans,
      score,
      correctCount: correct,
      totalCount: total,
      timeSpentSec,
      variantIndex: exam.variantIndex ?? 0,
      variantLabel: exam.variantLabel || alpha(exam.variantIndex ?? 0),
      cheatLog: cheatLogRef.current,
      submittedAt: new Date().toISOString()
    };

    // Persist to Firebase RTDB so teacher sees results across devices
    const db = getDb();
    if (db) {
      try {
        roomRef(db, exam.id).child('submissions').child(submission.id).set({
          ...submission,
          studentVersion: submission.variantLabel
        });
      } catch {}
    }

    onSubmit(submission);
  }, [answers, exam, orderedQuestions, studentName, studentClass, onSubmit]);

  const answered = Object.keys(answers).length;
  const total = orderedQuestions.length;
  const timerClass = timeLeft < 60 ? 'danger' : timeLeft < 300 ? 'warn' : '';
  const cheatCnt = cheatLog.length;

  return (
    <div className="exam-taking-root">
      {/* Cheat flash overlay */}
      {showFlash && <div className="cheat-overlay" />}

      {/* Cheat warning toast */}
      {cheatWarning && (
        <div className="cheat-warning">
          <span className="cheat-badge">⚠ ЧИТ</span>
          {cheatWarning}
        </div>
      )}

      {stoppedNow && (
        <div className="cheat-warning" style={{background:'#7f1d1d'}}>
          <span className="cheat-badge" style={{background:'#ef4444'}}>⏹</span>
          Багш шалгалтыг зогсоосон — автоматаар дуусгаж байна...
        </div>
      )}

      {/* Confirm dialog */}
      {showConfirm && (
        <div className="modal-overlay">
          <div className="modal" style={{maxWidth:400}}>
            <div className="modal-head"><div style={{fontFamily:'Outfit',fontWeight:800}}>⚠️ Шалгалт дуусгах уу?</div></div>
            <div className="modal-body">
              <p style={{fontSize:'0.9rem',color:'var(--text2)'}}>
                {answered < total
                  ? `Та ${total - answered} асуултанд хариулаагүй байна. Шалгалтыг дуусгахуу?`
                  : 'Бүх асуултанд хариуллаа. Шалгалтыг дуусгахуу?'}
              </p>
            </div>
            <div className="modal-foot">
              <button className="btn btn-outline" onClick={() => setShowConfirm(false)}>Үргэлжлүүлэх</button>
              <button className="btn btn-green" onClick={() => doSubmit({})}>✓ Дуусгах</button>
            </div>
          </div>
        </div>
      )}

      <div className="exam-header-bar">
        <div>
          <div className="exam-title-bar">{exam.title}</div>
          <div style={{fontSize:'0.78rem',color:'var(--text2)'}}>
            {answered}/{total} хариуллаа
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          {cheatCnt > 0 && (
            <div style={{background:'var(--red-light)',color:'var(--red)',padding:'5px 12px',borderRadius:20,fontSize:'0.78rem',fontWeight:700}}>
              ⚠ {cheatCnt} чит
            </div>
          )}
          <div className={`timer-badge ${timerClass}`}>
            ⏱ {fmt(timeLeft)}
          </div>
          <button className="btn btn-green btn-sm" onClick={() => setShowConfirm(true)}>✓ Дуусгах</button>
        </div>
      </div>

      {/* Progress */}
      <div style={{padding:'8px 24px',background:'white',borderBottom:'1px solid var(--border)'}}>
        <div className="progress-bar-wrap">
          <div className="progress-bar-fill" style={{width: `${(answered/total)*100}%`}} />
        </div>
        <div style={{fontSize:'0.75rem',color:'var(--text3)',textAlign:'right'}}>{answered}/{total}</div>
      </div>

      <div className="container-sm" style={{padding:'24px 20px'}}>
        {orderedQuestions.map((q, qi) => (
          <div className={`question-block ${answers[q.id] ? 'answered' : ''}`} key={q.id}>
            <div style={{display:'flex',gap:10,marginBottom:12}}>
              <span className="q-num">#{q.id}</span>
              {answers[q.id] && <span style={{fontSize:'0.75rem',color:'var(--green)',fontWeight:600,display:'flex',alignItems:'center',gap:4}}>✓ Хариуллаа</span>}
            </div>
            <div className="q-text" style={{fontSize:'0.95rem',marginBottom:14}}>{q.text}</div>
            {q.options.map(opt => (
              <button
                key={opt.key}
                className={`student-option ${answers[q.id] === opt.key ? 'selected' : ''}`}
                onClick={() => setAnswers(a => ({...a, [q.id]: opt.key}))}
              >
                <div className="opt-radio" />
                <span style={{fontWeight:600,color:'var(--text2)',minWidth:16}}>{opt.key})</span>
                <span>{opt.text}</span>
              </button>
            ))}
          </div>
        ))}

        <div style={{textAlign:'center',padding:'20px 0 40px'}}>
          <button className="btn btn-green btn-lg" onClick={() => setShowConfirm(true)} style={{minWidth:200}}>
            ✓ Шалгалт дуусгах
          </button>
        </div>
      </div>
    </div>
  );
}

            <span><strong style={{color:'var(--red)'}}>{submission.totalCount - submission.correctCount}</strong> буруу</span>
            <span>Нийт <strong>{submission.totalCount}</strong></span>
          </div>
        </div>

        <div className="card mb-3">
          <div className="card-header"><div className="card-title">📝 Асуулт тус бүрийн үр дүн</div></div>
          <div className="card-body" style={{padding:'14px'}}>
            {exam.questions.map(q => {
              const ua = submission.answers[q.id];
              const correct = q.answer ? ua === q.answer : null;
              return (
                <div key={q.id} style={{borderBottom:'1px solid var(--border)',paddingBottom:12,marginBottom:12}}>
                  <div style={{display:'flex',gap:8,alignItems:'flex-start',marginBottom:8}}>
                    <span className="q-num">#{q.id}</span>
                    {q.answer && (
                      <span style={{fontSize:'0.75rem',fontWeight:700,color: correct ? 'var(--green)' : 'var(--red)'}}>
                        {correct ? '✓ Зөв' : '✗ Буруу'}
                      </span>
                    )}
                    {!q.answer && <span style={{fontSize:'0.75rem',color:'var(--text3)'}}>— Оноогүй асуулт</span>}
                  </div>
                  <div style={{fontSize:'0.875rem',color:'var(--text)',marginBottom:10}}>{q.text}</div>
                  <div style={{display:'flex',flexDirection:'column',gap:5}}>
                    {q.options.map(opt => {
                      const isUser = ua === opt.key;
                      const isAnswer = q.answer === opt.key;
                      let cls = 'student-option';
                      if (isAnswer) cls += ' correct-show';
                      else if (isUser && !isAnswer) cls += ' wrong-show';
                      return (
                        <div key={opt.key} className={cls} style={{cursor:'default'}}>
                          <div className="opt-radio" />
                          <span style={{fontWeight:600,color:'var(--text2)',minWidth:16}}>{opt.key})</span>
                          <span>{opt.text}</span>
                          {isAnswer && <span style={{marginLeft:'auto',fontSize:'0.72rem',fontWeight:700,color:'var(--green)'}}>✓ зөв</span>}
                          {isUser && !isAnswer && <span style={{marginLeft:'auto',fontSize:'0.72rem',fontWeight:700,color:'var(--red)'}}>← таны хариулт</span>}
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        <div style={{textAlign:'center',paddingBottom:40}}>
          <button className="btn btn-violet btn-lg" onClick={onHome}>🏠 Үндсэн хуудас руу буцах</button>
        </div>
      </div>
    </div>
  );
}

// ─── QR STUDENT LOGIN ─────────────────────────────────────────────────────────
function QRStudentLogin({ exam, qrClassName, onStart, onBack }) {
  const [name, setName] = useState('');
  const classLabel = (qrClassName || exam?.qrClassName || '').trim();
  // Count questions: support both old (exam.questions) and new (exam.versions) format
  const qCount = useMemo(() => {
    if (exam?.versions && typeof exam.versions === 'object') {
      const vals = Object.values(exam.versions);
      return vals.length > 0 ? (vals[0] || []).length : 0;
    }
    if (Array.isArray(exam?.questions)) return exam.questions.length;
    return 0;
  }, [exam]);

  const announceJoin = useCallback((n) => {
    const c = classLabel;
    const classKey = exam?.qrClassKey || normalizeClassKey(c);
    try {
      const bc = new BroadcastChannel('se_join_' + exam.id + '_' + classKey);
      bc.postMessage({ type: 'JOIN', payload: { name: n, cls: c, at: Date.now() } });
      bc.close();
    } catch {}

    const db = getDb();
    if (db) {
      try {
        roomRef(db, exam.roomID || exam.id).child('joins').push({
          name: n,
          cls: c,
          classKey,
          at: firebase.database.ServerValue.TIMESTAMP
        });
      } catch {}
    }
  }, [exam?.id, exam?.qrClassKey, classLabel]);

  return (
    <div style={{minHeight:'100vh',background:'linear-gradient(160deg,#eef2ff,#f5f0ff)',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div className="modal" style={{maxWidth:420}}>
        <div className="modal-head">
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div style={{width:48,height:48,borderRadius:12,background:'linear-gradient(135deg,var(--primary),var(--violet))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.4rem'}}>📱</div>
            <div>
              <div style={{fontFamily:'Outfit',fontWeight:800,fontSize:'1.1rem'}}>QR Шалгалт</div>
              <div style={{fontSize:'0.8rem',color:'var(--text2)'}}>{exam.title}{classLabel ? ' · ' + classLabel + ' анги' : ''}</div>
            </div>
          </div>
        </div>
        <div className="modal-body">
          <div style={{background:'var(--violet-light)',borderRadius:10,padding:'12px 16px',marginBottom:18,fontSize:'0.85rem',color:'#4c3db0',lineHeight:1.6}}>
            📋 <strong>{qCount} асуулт</strong> &nbsp;·&nbsp; ⏱ <strong>{exam.duration} мин</strong> &nbsp;·&nbsp; 📚 {exam.subject}
          </div>
          {exam.stopped && (
            <div style={{background:'var(--red-light)',border:'1px solid #fecaca',borderRadius:10,padding:'10px 14px',marginBottom:14,fontSize:'0.85rem',color:'var(--red)',fontWeight:700}}>
              ⏹ Энэ шалгалтыг багш зогсоосон байна.
            </div>
          )}
          {!classLabel && (
            <div style={{background:'var(--amber-light)',border:'1px solid #fcd34d',borderRadius:10,padding:'10px 14px',marginBottom:14,fontSize:'0.85rem',color:'#92400e',fontWeight:600}}>
              ⚠️ Хуучин QR байна. Багшаас шинэ QR (анги томилсон) аваарай.
            </div>
          )}
          {classLabel && (
            <div style={{background:'#ecfdf5',border:'1px solid #a7f3d0',borderRadius:10,padding:'10px 14px',marginBottom:14,fontSize:'0.88rem',color:'#065f46',fontWeight:600}}>
              📚 {classLabel} ангийн шалгалт — зөвхөн нэрээ бичнэ үү
            </div>
          )}
          <div className="form-group">
            <label className="form-label">Таны нэр</label>
            <input
              className="form-input"
              placeholder="Бүтэн нэр"
              value={name}
              onChange={e => setName(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && name.trim() && classLabel && onStart(name.trim(), classLabel)}
              autoFocus
            />
          </div>
        </div>
        <div className="modal-foot">
          <button className="btn btn-ghost" onClick={onBack}>← Буцах</button>
          <button
            className="btn btn-violet btn-lg"
            onClick={() => { const n=name.trim(); announceJoin(n); onStart(n, classLabel); }}
            disabled={!name.trim() || !classLabel || !!exam.stopped}
          >
            ▶ Шалгалт эхлэх
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
function App() {
  const [exams, setExams] = useLS('se_exams', []);
  const [submissions, setSubmissions] = useLS('se_submissions', []);
  const [apiKey, setApiKey] = useState(() => localStorage.getItem('se_apikey') || '');
  const [qrExam, setQrExam] = useState(null); // exam loaded from QR URL

  const [page, setPage] = useState({ type: 'landing' });
  const [roomLoaded, setRoomLoaded] = useState(null); // {roomID,title,subject,duration,passingScore,versions}
  const [assigningVariant, setAssigningVariant] = useState(false);

  const assigningRef = useRef(false);
  const startStudentExam = useCallback(async (roomExam, studentName, studentClass) => {
    if (assigningRef.current) return;
    assigningRef.current = true;
    setAssigningVariant(true);
    try {
      const exam = await pickVariantForStudent(roomExam, studentName, studentClass);
      setPage({ type: 'examIntro', exam, studentName, studentClass });
    } catch (e) {
      alert('Хувилбар томилох алдаа: ' + (e?.message || 'дахин оролдоно уу'));
    } finally {
      assigningRef.current = false;
      setAssigningVariant(false);
    }
  }, []);

  // Handle QR URL hash on load
  useEffect(() => {
    const hash = window.location.hash;
    if (hash.startsWith('#qr=')) {
      try {
        const compressed = hash.slice(4);
        const json = LZString.decompressFromEncodedURIComponent(compressed);
        const packed = JSON.parse(json);
        const parsed = unpackExamFromQR(packed);
        if (parsed?.roomID) {
          setPage({ type: 'qrRoom', roomID: parsed.roomID, qrClassKey: parsed.classKey || '' });
          window.location.hash = '';
        }
      } catch(e) { console.error('QR decode error', e); }
    }
  }, []);

  const goHome = () => { setQrExam(null); setPage({ type: 'landing' }); };

  const deleteExam = useCallback((exam) => {
    if (!exam?.id) return;
    setExams(prev => prev.filter(e => e.id !== exam.id));
    setSubmissions(prev => prev.filter(s => s.examId !== exam.id));
    const db = getDb();
    if (db) {
      try { roomRef(db, exam.id).remove(); } catch {}
    }
  }, [setExams, setSubmissions]);

  // Result page: special full-page rendering
  if (page.type === 'result') {
    return <ResultPage submission={page.submission} exam={page.exam} onHome={goHome} />;
  }

  // Exam taking: full-page
  if (page.type === 'exam') {
    return (
      <div>
        <ExamTaker
          exam={page.exam}
          studentName={page.studentName}
          studentClass={page.studentClass}
          onSubmit={sub => {
            setSubmissions(s => [...s, sub]);
            setPage({ type: 'result', submission: sub, exam: page.exam });
          }}
          onBack={() => setPage({ type: 'landing' })}
        />
      </div>
    );
  }

  if (page.type === 'omrScanner') {
    return (
      <div>
        <Topbar userName={page.teacherName || 'Багш'} role="teacher" onHome={goHome} />
        <OMRScannerPage
          exam={page.exam}
          onBack={() => setPage({ type: 'teacherDash', name: page.teacherName })}
          onSubmit={sub => setSubmissions(s => [...s, sub])}
        />
      </div>
    );
  }

  // Exam intro
  if (page.type === 'examIntro') {
    return (
      <div>
        <Topbar userName={page.studentName} role="student" onHome={goHome} />
        <ExamIntro
          exam={page.exam}
          studentName={page.studentName}
          studentClass={page.studentClass}
          onStart={() => setPage({ ...page, type: 'exam' })}
          onBack={() => setPage({ type: 'student' })}
        />
      </div>
    );
  }

  return (
    <div className="app">
      {assigningVariant && (
        <div className="modal-overlay" style={{zIndex:9999}}>
          <div className="modal" style={{maxWidth:360,textAlign:'center'}}>
            <div className="modal-body" style={{padding:28}}>
              <div className="spinner" style={{margin:'0 auto 14px'}} />
              <div style={{fontFamily:'Outfit',fontWeight:700}}>Хувилбар томилж байна...</div>
              <div style={{fontSize:'0.85rem',color:'var(--text2)',marginTop:8}}>Ангид тэнцүү хуваарилна (A/B)</div>
            </div>
          </div>
        </div>
      )}
      {page.type === 'landing' && (
        <>
          <LandingPage onSelect={role => {
            if (role === 'teacher') setPage({ type: 'teacherLogin' });
            else setPage({ type: 'student' });
          }} />
        </>
      )}

      {page.type === 'teacherLogin' && (
        <>
          <LandingPage onSelect={() => {}} />
          <TeacherLogin
            onLogin={(name, key) => {
              if (key) setApiKey(key);
              setPage({ type: 'teacherDash', name });
            }}
          />
        </>
      )}

      {page.type === 'teacherDash' && (
        <div>
          <Topbar
            userName={page.name}
            role="teacher"
            onHome={goHome}
          />
          <div className="container-lg" style={{paddingTop:8}}>
            <TeacherDashboard
              exams={exams}
              submissions={submissions}
              apiKey={apiKey}
              teacherName={page.name}
              onCreateExam={() => setPage({ ...page, type: 'createExam' })}
              onApiKey={k => { setApiKey(k); localStorage.setItem('se_apikey', k); }}
              onDeleteExam={deleteExam}
              onOpenOMR={exam => setPage({ type: 'omrScanner', exam, teacherName: page.name })}
            />
          </div>
        </div>
      )}

      {page.type === 'createExam' && (
        <div>
          <Topbar userName={page.name} role="teacher" onHome={goHome} />
          <div className="container-sm" style={{paddingTop:8, paddingBottom:40}}>
            <CreateExam
              apiKey={apiKey}
              onSave={exam => {
                setExams(e => [...e, exam]);
                setPage({ type: 'teacherDash', name: page.name });
              }}
              onCancel={() => setPage({ type: 'teacherDash', name: page.name })}
            />
          </div>
        </div>
      )}

      {page.type === 'student' && (
        <div>
          <Topbar onHome={goHome} />
          <StudentPortal
            onStartExam={(exam, name, cls) => startStudentExam(exam, name, cls)}
            onBack={goHome}
          />
        </div>
      )}

      {page.type === 'qrRoom' && page.roomID && (
        <QRRoomLoader
          roomID={page.roomID}
          onLoaded={(roomExam) => {
            const db = getDb();
            const ck = page.qrClassKey || '';
            const attachClass = (className) => {
              setPage({
                type: 'qrStudent',
                exam: { ...roomExam, roomID: roomExam.roomID || page.roomID, qrClassKey: ck, qrClassName: className }
              });
            };
            if (ck && db) {
              roomRef(db, page.roomID).child('classes').child(ck).once('value')
                .then(snap => attachClass((snap.val()?.name) || ck))
                .catch(() => attachClass(ck));
            } else {
              attachClass(ck ? displayClassName(ck, ck) : '');
            }
          }}
          onBack={goHome}
        />
      )}

      {page.type === 'qrStudent' && page.exam && (
        <QRStudentLogin
          exam={page.exam}
          qrClassName={page.exam.qrClassName}
          onStart={(name, cls) => startStudentExam(page.exam, name, cls)}
          onBack={goHome}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
