<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartEXAM — Ухаалаг Шалгалтын Систем</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f4ff;
  --surface: #ffffff;
  --surface2: #f8faff;
  --border: #e2e8f5;
  --primary: #3b5bdb;
  --primary-light: #e8ecff;
  --primary-dark: #2f4bc4;
  --violet: #7c3aed;
  --violet-light: #f0ebff;
  --green: #059669;
  --green-light: #ecfdf5;
  --red: #dc2626;
  --red-light: #fef2f2;
  --amber: #d97706;
  --amber-light: #fffbeb;
  --text: #1e293b;
  --text2: #475569;
  --text3: #94a3b8;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(59,91,219,.06);
  --shadow-lg: 0 8px 32px rgba(59,91,219,.12);
  --radius: 14px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}
h1,h2,h3,h4 { font-family: 'Outfit', sans-serif; }

/* ─── LAYOUT ─────────────────────────────────── */
.app { min-height: 100vh; }
.container { max-width: 960px; margin: 0 auto; padding: 0 20px; }
.container-sm { max-width: 680px; margin: 0 auto; padding: 0 20px; }
.container-lg { max-width: 1100px; margin: 0 auto; padding: 0 20px; }

/* ─── TOPBAR ─────────────────────────────────── */
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 1px 0 var(--border);
}
.topbar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: 'Outfit', sans-serif;
  font-weight: 800;
  font-size: 1.15rem;
  color: var(--primary);
  cursor: pointer;
}
.brand-badge {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--primary), var(--violet));
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 0.7rem;
  font-weight: 900;
  letter-spacing: -.5px;
}
.topbar-right { display: flex; align-items: center; gap: 10px; }
.topbar-user {
  font-size: 0.85rem;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 8px;
}
.avatar {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: var(--primary-light);
  color: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  font-weight: 700;
}

/* ─── BUTTONS ────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 18px;
  border-radius: var(--radius-sm);
  border: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.875rem;
  font-weight: 500;
  cursor: pointer;
  transition: all .18s ease;
  white-space: nowrap;
  text-decoration: none;
}
.btn:disabled { opacity: .5; cursor: not-allowed; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover:not(:disabled) { background: var(--primary-dark); box-shadow: 0 4px 12px rgba(59,91,219,.35); transform: translateY(-1px); }
.btn-violet { background: var(--violet); color: white; }
.btn-violet:hover:not(:disabled) { background: #6d28d9; box-shadow: 0 4px 12px rgba(124,58,237,.35); transform: translateY(-1px); }
.btn-green { background: var(--green); color: white; }
.btn-green:hover:not(:disabled) { background: #047857; transform: translateY(-1px); }
.btn-outline { background: white; color: var(--text); border: 1.5px solid var(--border); }
.btn-outline:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
.btn-ghost { background: transparent; color: var(--text2); }
.btn-ghost:hover { background: var(--surface2); color: var(--text); }
.btn-red { background: var(--red-light); color: var(--red); }
.btn-red:hover:not(:disabled) { background: var(--red); color: white; }
.btn-lg { padding: 12px 24px; font-size: 1rem; border-radius: 10px; }
.btn-sm { padding: 6px 12px; font-size: 0.8rem; }

/* ─── CARDS ──────────────────────────────────── */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.card-header {
  padding: 18px 22px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-body { padding: 22px; }
.card-title { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1rem; color: var(--text); }

/* ─── FORM ───────────────────────────────────── */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 0.825rem; font-weight: 600; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
.form-input, .form-select, .form-textarea {
  width: 100%;
  padding: 10px 13px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  color: var(--text);
  background: white;
  transition: border-color .15s;
  outline: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59,91,219,.1); }
.form-textarea { resize: vertical; min-height: 140px; line-height: 1.6; }
.form-hint { font-size: 0.78rem; color: var(--text3); margin-top: 5px; }
.form-error { font-size: 0.78rem; color: var(--red); margin-top: 5px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

/* ─── BADGE ──────────────────────────────────── */
.badge {
  display: inline-flex; align-items: center;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 600;
  gap: 4px;
}
.badge-blue { background: var(--primary-light); color: var(--primary); }
.badge-violet { background: var(--violet-light); color: var(--violet); }
.badge-green { background: var(--green-light); color: var(--green); }
.badge-red { background: var(--red-light); color: var(--red); }
.badge-amber { background: var(--amber-light); color: var(--amber); }
.badge-gray { background: #f1f5f9; color: var(--text2); }

/* ─── LANDING ────────────────────────────────── */
.landing {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  background: linear-gradient(160deg, #eef2ff 0%, #f0f4ff 40%, #f5f0ff 100%);
  position: relative;
  overflow: hidden;
}
.landing::before {
  content: '';
  position: absolute;
  top: -100px;
  right: -100px;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(124,58,237,.08) 0%, transparent 70%);
  pointer-events: none;
}
.landing::after {
  content: '';
  position: absolute;
  bottom: -80px;
  left: -80px;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(59,91,219,.07) 0%, transparent 70%);
  pointer-events: none;
}
.landing-hero { text-align: center; margin-bottom: 48px; }
.logo-big {
  width: 72px; height: 72px;
  border-radius: 20px;
  background: linear-gradient(135deg, var(--primary) 0%, var(--violet) 100%);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 20px;
  box-shadow: 0 12px 32px rgba(59,91,219,.3);
  font-family: 'Outfit', sans-serif;
  font-weight: 900;
  font-size: 1.4rem;
  color: white;
  letter-spacing: -1px;
}
.landing-title {
  font-family: 'Outfit', sans-serif;
  font-weight: 900;
  font-size: 2.8rem;
  color: var(--text);
  letter-spacing: -1.5px;
  line-height: 1;
  margin-bottom: 8px;
}
.landing-sub {
  font-size: 1rem;
  color: var(--primary);
  font-weight: 600;
  margin-bottom: 12px;
}
.landing-desc { font-size: 0.95rem; color: var(--text2); max-width: 420px; }
.role-cards { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
.role-card {
  width: 220px;
  padding: 32px 24px;
  border-radius: 18px;
  border: 2px solid transparent;
  background: white;
  cursor: pointer;
  text-align: center;
  transition: all .22s ease;
  box-shadow: var(--shadow);
}
.role-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
.role-card.teacher:hover { border-color: var(--primary); }
.role-card.student:hover { border-color: var(--violet); }
.role-icon { font-size: 2.5rem; margin-bottom: 12px; }
.role-title { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1.2rem; color: var(--text); margin-bottom: 6px; }
.role-desc { font-size: 0.82rem; color: var(--text2); }

/* ─── PAGE HEADER ────────────────────────────── */
.page-header {
  padding: 28px 0 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 28px;
}
.page-title { font-weight: 800; font-size: 1.6rem; color: var(--text); }
.page-sub { font-size: 0.875rem; color: var(--text2); margin-top: 3px; }

/* ─── EXAM CARDS GRID ────────────────────────── */
.exam-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.exam-card {
  background: white;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  transition: all .18s;
  cursor: default;
  box-shadow: var(--shadow);
}
.exam-card:hover { border-color: var(--primary); box-shadow: var(--shadow-lg); }
.exam-card-title { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1rem; margin-bottom: 6px; }
.exam-card-meta { font-size: 0.8rem; color: var(--text2); display: flex; gap: 12px; flex-wrap: wrap; margin: 8px 0 12px; }
.exam-card-meta span { display: flex; align-items: center; gap: 4px; }
.exam-card-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

/* ─── STEP INDICATOR ─────────────────────────── */
.steps { display: flex; gap: 0; margin-bottom: 28px; }
.step {
  flex: 1;
  display: flex;
  align-items: center;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text3);
}
.step.active { color: var(--primary); }
.step.done { color: var(--green); }
.step-num {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--border);
  color: var(--text3);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem; font-weight: 700;
  margin-right: 8px;
  flex-shrink: 0;
}
.step.active .step-num { background: var(--primary); color: white; }
.step.done .step-num { background: var(--green); color: white; }
.step-line { flex: 1; height: 1px; background: var(--border); margin: 0 10px; }
.step:last-child .step-line { display: none; }

/* ─── AI PARSER ──────────────────────────────── */
.ai-hint-box {
  background: linear-gradient(135deg, var(--violet-light), #f0f4ff);
  border: 1.5px solid #d8c8ff;
  border-radius: var(--radius);
  padding: 16px 18px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  margin-bottom: 18px;
}
.ai-icon { font-size: 1.3rem; flex-shrink: 0; margin-top: 1px; }
.ai-hint-text { font-size: 0.85rem; color: #4c3db0; line-height: 1.5; }
.ai-hint-text strong { color: var(--violet); }
.parsing-overlay {
  text-align: center;
  padding: 48px 24px;
}
.spinner {
  width: 44px; height: 44px;
  border: 3px solid var(--violet-light);
  border-top-color: var(--violet);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── QUESTION PREVIEW ───────────────────────── */
.question-item {
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  background: white;
  margin-bottom: 12px;
  transition: border-color .15s;
}
.question-item:hover { border-color: var(--primary); }
.q-num { display: inline-block; background: var(--primary-light); color: var(--primary); font-size: 0.75rem; font-weight: 700; padding: 2px 8px; border-radius: 12px; margin-bottom: 8px; }
.q-text { font-size: 0.9rem; color: var(--text); line-height: 1.6; margin-bottom: 12px; }
.options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.option-item {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 7px 10px;
  border-radius: 8px;
  background: var(--surface2);
  font-size: 0.82rem;
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: all .12s;
}
.option-item.correct { background: var(--green-light); border-color: #6ee7b7; }
.option-key {
  width: 20px; height: 20px;
  border-radius: 50%;
  background: white;
  border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--text2);
  flex-shrink: 0;
  margin-top: 1px;
}
.option-item.correct .option-key { background: var(--green); border-color: var(--green); color: white; }

/* ─── ANSWER SELECT ──────────────────────────── */
.answer-select-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px dashed var(--border);
}
.answer-label { font-size: 0.78rem; color: var(--text2); font-weight: 600; }
.ans-btn {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: white;
  font-size: 0.75rem;
  font-weight: 700;
  cursor: pointer;
  transition: all .12s;
  display: flex; align-items: center; justify-content: center;
  color: var(--text2);
}
.ans-btn.selected { background: var(--green); border-color: var(--green); color: white; }
.ans-btn:hover:not(.selected) { border-color: var(--primary); color: var(--primary); }

/* ─── STUDENT EXAM ───────────────────────────── */
.exam-header-bar {
  background: white;
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 60px;
  z-index: 50;
}
.exam-title-bar { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1rem; }
.timer-badge {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 7px 14px;
  border-radius: 20px;
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 0.95rem;
  background: var(--primary-light);
  color: var(--primary);
}
.timer-badge.warn { background: var(--amber-light); color: var(--amber); }
.timer-badge.danger { background: var(--red-light); color: var(--red); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.7; } }

.exam-question-wrapper {
  padding: 24px 0;
}
.question-block {
  background: white;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 22px;
  margin-bottom: 14px;
  transition: border-color .15s;
}
.question-block.answered { border-color: #a5f3d8; }
.student-option {
  display: flex;
  align-items: flex-start;
  gap: 11px;
  padding: 10px 14px;
  border-radius: 10px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  cursor: pointer;
  margin-bottom: 7px;
  font-size: 0.875rem;
  transition: all .15s;
  text-align: left;
  width: 100%;
}
.student-option:hover { border-color: var(--primary); background: var(--primary-light); }
.student-option.selected { border-color: var(--primary); background: var(--primary-light); }
.student-option.correct-show { border-color: var(--green); background: var(--green-light); }
.student-option.wrong-show { border-color: var(--red); background: var(--red-light); }
.opt-radio {
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 2px solid var(--border);
  flex-shrink: 0;
  margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
  transition: all .12s;
}
.student-option.selected .opt-radio { border-color: var(--primary); background: var(--primary); }
.student-option.selected .opt-radio::after { content: ''; width: 7px; height: 7px; border-radius: 50%; background: white; }
.student-option.correct-show .opt-radio { border-color: var(--green); background: var(--green); }
.student-option.wrong-show .opt-radio { border-color: var(--red); background: var(--red); }

/* ─── PROGRESS BAR ───────────────────────────── */
.progress-bar-wrap { background: var(--border); border-radius: 6px; height: 6px; overflow: hidden; margin-bottom: 6px; }
.progress-bar-fill { height: 100%; border-radius: 6px; background: linear-gradient(90deg, var(--primary), var(--violet)); transition: width .3s ease; }

/* ─── RESULT PAGE ────────────────────────────── */
.result-hero {
  text-align: center;
  padding: 36px 24px 28px;
  background: linear-gradient(135deg, #eef2ff, #f5f0ff);
  border-radius: var(--radius);
  margin-bottom: 24px;
}
.score-circle {
  width: 110px; height: 110px;
  border-radius: 50%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  margin: 0 auto 16px;
  font-family: 'Outfit', sans-serif;
}
.score-circle.pass { background: linear-gradient(135deg, #d1fae5, #a7f3d0); border: 4px solid var(--green); }
.score-circle.fail { background: linear-gradient(135deg, #fee2e2, #fecaca); border: 4px solid var(--red); }
.score-pct { font-size: 2rem; font-weight: 900; line-height: 1; }
.score-circle.pass .score-pct { color: var(--green); }
.score-circle.fail .score-pct { color: var(--red); }
.score-label { font-size: 0.7rem; font-weight: 600; color: var(--text2); }

/* ─── SUBMISSIONS TABLE ──────────────────────── */
.sub-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
.sub-table th {
  padding: 10px 14px;
  background: var(--surface2);
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--text2);
  text-align: left;
  border-bottom: 2px solid var(--border);
}
.sub-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); color: var(--text); }
.sub-table tr:last-child td { border-bottom: none; }
.sub-table tr:hover td { background: var(--surface2); }

/* ─── SETTINGS MODAL ─────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(15,15,35,.45);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  z-index: 999;
  padding: 20px;
}
.modal {
  background: white;
  border-radius: 20px;
  width: 100%;
  max-width: 500px;
  box-shadow: 0 20px 60px rgba(0,0,0,.18);
  animation: modalIn .2s ease;
}
@keyframes modalIn { from { opacity:0; transform:scale(.96) translateY(10px); } to { opacity:1; transform:scale(1) translateY(0); } }
.modal-head {
  padding: 22px 24px 16px;
  border-bottom: 1px solid var(--border);
}
.modal-body { padding: 22px 24px; }
.modal-foot { padding: 14px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }

/* ─── EMPTY STATE ────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 56px 24px;
  color: var(--text2);
}
.empty-icon { font-size: 3rem; margin-bottom: 12px; opacity: .6; }
.empty-title { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.1rem; color: var(--text); margin-bottom: 6px; }
.empty-sub { font-size: 0.875rem; margin-bottom: 20px; }

/* ─── STATS STRIP ────────────────────────────── */
.stats-strip { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 24px; }
.stat-card {
  flex: 1; min-width: 130px;
  background: white;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  box-shadow: var(--shadow);
}
.stat-val { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1.8rem; line-height: 1; color: var(--text); }
.stat-lbl { font-size: 0.78rem; color: var(--text2); font-weight: 600; margin-top: 4px; }

    } catch { return init; }
  });
  const set = useCallback(v => {
    setVal(prev => {

      try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
      return next;
    });
  }, [key]);
  return [val, set];
};

  const m = Math.floor((s % 3600) / 60);

  if (h > 0) return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0') + ':' + String(r).padStart(2, '0');

  return [{ label: 'A', questions: [] }];
};

// ─── AI PARSER (Groq) ─────────────────────────────────────────────────────────
const parseTestWithAI = async (rawText, apiKey) => {
  const sys = `You are an exam question parser. Parse the multiple-choice questions from the given text and return ONLY a valid JSON array. Nothing else — no markdown, no explanation, just the JSON array.

Schema for each item:
{
  "id": <number, 1-based>,
  "text": "<question text, use ________ for blanks>",
  "options": [
    {"key": "A", "text": "<option text>"},
    {"key": "B", "text": "<option text>"},
    {"key": "C", "text": "<option text>"},
    {"key": "D", "text": "<option text>"}
  ],
  "answer": "<correct key letter like A/B/C/D, or null if not marked>"
}

Rules:
- Normalize any format to the schema above
- Clean up whitespace and formatting
- If a question has a marked answer (asterisk, ✓, (correct), etc.), capture it
- Always include exactly 4 options per question; if missing, create plausible distractors
- Return ONLY the JSON array`;

  const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${apiKey}`
    },
    body: JSON.stringify({
      model: 'llama-3.3-70b-versatile',
      max_tokens: 4096,
      messages: [
        { role: 'system', content: sys },
        { role: 'user', content: rawText }
      ]
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${response.status}`);
  }
  const data = await response.json();
  const text = data.choices?.[0]?.message?.content?.trim() || '';
  const clean = text.replace(/^```(?:json)?\n?/, '').replace(/\n?```$/, '').trim();
  return JSON.parse(clean);
};

// ─── AI PARSE STEP ─────────────────────────────────────────────────────────────
function AIParseStep({ apiKey, onParsed, onManual, onBack, variantCount, onVariantCountChange }) {
  const [raw, setRaw] = useState('');
  const [parsing, setParsing] = useState(false);
  const [err, setErr] = useState('');

  const doParse = async () => {
    if (!raw.trim()) return;
    if (!apiKey) { setErr('API түлхүүр байхгүй. Тохиргоо→ API key оруулна уу.'); return; }
    setParsing(true); setErr('');
    try {
      const qs = await parseTestWithAI(raw, apiKey);
      if (!Array.isArray(qs) || qs.length === 0) throw new Error('Асуулт илрэхгүй байна');
      onParsed(qs);
    } catch (e) {
      setErr('Алдаа: ' + e.message);
    } finally {
      setParsing(false);
    }
  };

  return (
    <div>
      <div className="ai-hint-box">
        <div className="ai-icon">✨</div>
        <div className="ai-hint-text">
          <strong>AI автомат задлан шинжилгээ</strong><br/>
          Тестийн текстийг доорх талбарт paste хийнэ үү. Ямар ч формат болно —
          нэг мөрт, markdown, дугаарлалттай, нэргүй. AI таны тестийг автоматаар стандарт формат руу хөрвүүлнэ.
        </div>
      </div>

      {!apiKey && (
        <div className="apikey-banner">
          ⚠️ API түлхүүр оруулаагүй — AI задлан шинжилгээ ажиллахгүй.
          <button className="btn btn-outline btn-sm" onClick={() => alert('Дээрх ⚙ Тохиргоо товчоор API key оруулна уу')}>Тохиргоо</button>
        </div>
      )}

      {parsing ? (
        <div className="parsing-overlay">
          <div className="spinner"></div>
          <div style={{fontFamily:'Outfit',fontWeight:700,fontSize:'1.1rem',marginBottom:8}}>AI задлан шинжилж байна...</div>
          <div style={{fontSize:'0.85rem',color:'var(--text2)'}}>Тестийн асуулт, хариултуудыг автоматаар таних</div>
        </div>
      ) : (
        <>
          <div className="form-group">
            <label className="form-label">Тестийн текст</label>
            <textarea
              className="form-textarea"
              style={{minHeight:240,fontFamily:'monospace',fontSize:'0.82rem'}}
              placeholder={"Тестийн текстийг энд paste хийнэ үү...\n\n1. The police ________ the thief...\n* A) catched\n* B) caught\n* C) caughted\n* D) had catch\n..."}
              value={raw}
              onChange={e => setRaw(e.target.value)}
            />
            {err && <div className="form-error">⚠ {err}</div>}
          </div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}}>
            <button className="btn btn-outline" onClick={onBack}>← Буцах</button>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-outline" onClick={() => onVariantCountChange?.()} title="Шалгалтын хувилбар нэмэх" disabled={(variantCount || 1) >= 5}>

              <button className="btn btn-outline" onClick={onManual}>✏ Гараар оруулах</button>

        </>
      )}
    </div>
  );
}

// ─── QUESTION EDITOR ──────────────────────────────────────────────────────────
function QuestionEditor({ questions, onChange }) {
  const setQ = (idx, field, val) => {
    const next = questions.map((q, i) => i === idx ? {...q, [field]: val} : q);
    onChange(next);
  };
  const setOpt = (qi, oi, val) => {
    const next = questions.map((q, i) => {
      if (i !== qi) return q;
      const opts = q.options.map((o, j) => j === oi ? {...o, text: val} : o);
      return {...q, options: opts};
    });
    onChange(next);
  };
  const addQ = () => {
    onChange([...questions, {
      id: questions.length + 1,
      text: '',
      options: [{key:'A',text:''},{key:'B',text:''},{key:'C',text:''},{key:'D',text:''}],
      answer: null
    }]);
  };
  const removeQ = idx => onChange(questions.filter((_, i) => i !== idx));

  return (
    <div>
      {questions.map((q, qi) => (
        <div className="question-item" key={qi} style={{marginBottom:16}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
            <span className="q-num">#{q.id}</span>
            <button className="btn btn-red btn-sm" onClick={() => removeQ(qi)}>✕ Устгах</button>
          </div>
          <textarea
            className="form-textarea"
            style={{minHeight:60,fontSize:'0.875rem',marginBottom:10}}
            placeholder="Асуултын текст..."
            value={q.text}
            onChange={e => setQ(qi, 'text', e.target.value)}
          />
          <div className="options-grid" style={{marginBottom:10}}>
            {q.options.map((opt, oi) => (
              <div key={opt.key} style={{display:'flex',gap:7,alignItems:'center'}}>
                <div className="option-key" style={{background: q.answer===opt.key ? 'var(--green)' : undefined, color: q.answer===opt.key ? 'white' : undefined, border: q.answer===opt.key ? '1.5px solid var(--green)' : undefined}}>{opt.key}</div>
                <input
                  className="form-input"
                  style={{flex:1,padding:'6px 10px',fontSize:'0.82rem'}}
                  placeholder={`${opt.key} хариулт...`}
                  value={opt.text}
                  onChange={e => setOpt(qi, oi, e.target.value)}
                />
              </div>
            ))}
          </div>
          <div className="answer-select-row">
            <span className="answer-label">Зөв хариулт:</span>
            {q.options.map(opt => (
              <button
                key={opt.key}
                className={`ans-btn ${q.answer === opt.key ? 'selected' : ''}`}
                onClick={() => setQ(qi, 'answer', q.answer === opt.key ? null : opt.key)}
              >{opt.key}</button>
            ))}
            {!q.answer && <span style={{fontSize:'0.75rem',color:'var(--text3)',marginLeft:6}}>— оноогүй</span>}
          </div>
        </div>
      ))}
      <button className="btn btn-outline" style={{width:'100%',justifyContent:'center',padding:'11px'}} onClick={addQ}>
        + Асуулт нэмэх
      </button>
    </div>
  );
}

// ─── CREATE EXAM ──────────────────────────────────────────────────────────────
function CreateExam({ apiKey, onSave, onCancel }) {
  const [step, setStep] = useState(1); // 1=info, 2=parse, 3=review
  const [info, setInfo] = useState({ title: '', subject: 'Англи хэл', duration: 45, passingScore: 60 });
  const [variants, setVariants] = useState([{ label: 'A', questions: [] }]);
  const [activeVar, setActiveVar] = useState(0);
  const [saving, setSaving] = useState(false);
  const variantCount = variants.length;

  const stepLabels = ['Мэдээлэл', 'Тест оруулах', 'Хянах & нийтлэх'];

  const handleParsed = qs => {
    setVariants(prev => prev.map((v, idx) => idx === activeVar ? ({...v, questions: qs}) : v));
    setStep(3);
  };

  const handleManual = () => {
    const seed = [{id:1,text:'',options:[{key:'A',text:''},{key:'B',text:''},{key:'C',text:''},{key:'D',text:''}],answer:null}];
    setVariants(prev => prev.map((v, idx) => idx === activeVar ? ({...v, questions: seed}) : v));
    setStep(3);
  };

  const addVariant = () => {
    setVariants(prev => {
      const nextIdx = prev.length;
      if (nextIdx >= 5) return prev;
      return [...prev, { label: alpha(nextIdx), questions: [] }];
    });
    setActiveVar(v => Math.min(v + 1, 4));
  };

  const handlePublish = () => {
    const hasAny = variants.some(v => (v.questions || []).some(q => (q.text || '').trim()));
    if (!hasAny) { alert('Дор хаяж нэг асуулт оруулна уу'); return; }
    setSaving(true);
    setTimeout(() => {
      const normalizedVariants = variants.map((v, vidx) => {
        const valid = (v.questions || []).filter(q => (q.text || '').trim());
        const normalizedQs = valid.map((q, i) => ({...q, id: i + 1}));
        return { label: v.label || alpha(vidx), questions: normalizedQs };
      }).filter(v => v.questions.length > 0);
      const exam = {
        id: uid(),
        ...info,
        variants: normalizedVariants.length ? normalizedVariants : [{ label: 'A', questions: [] }],
        createdAt: new Date().toISOString(),
        published: true,
        submissionCount: 0
      };

      // Publish room to Firebase (activeRooms/{roomID})
      const db = getDb();
      if (db) {
        try {
          const versions = {};
          exam.variants.forEach((v) => { versions[v.label] = packQuestions(v.questions); });
          roomRef(db, exam.id).set({
            roomID: exam.id,
            title: exam.title,
            subject: exam.subject,
            duration: exam.duration,
            passingScore: exam.passingScore,
            createdAt: exam.createdAt,
            versions
          });
        } catch {}
      }

      onSave(exam);
    }, 300);
  };

  return (
    <div>
      <div className="page-header">
        <h2 className="page-title">✏ Шинэ тест үүсгэх</h2>
      </div>

      {/* Steps */}
      <div className="steps mb-4">
        {stepLabels.map((lbl, i) => (
          <React.Fragment key={i}>
            <div className={`step ${step === i+1 ? 'active' : step > i+1 ? 'done' : ''}`}>
              <div className="step-num">{step > i+1 ? '✓' : i+1}</div>
              <span>{lbl}</span>
            </div>
            {i < stepLabels.length - 1 && <div className="step-line" />}
          </React.Fragment>
        ))}
      </div>

      <div className="card">
        <div className="card-body">
          {step === 1 && (
            <div>
              <div className="form-row">
                <div className="form-group">
                  <label className="form-label">Шалгалтын нэр</label>
                  <input className="form-input" placeholder="жн: Simple Past Tense" value={info.title} onChange={e => setInfo(p => ({...p, title: e.target.value}))} />
                </div>
                <div className="form-group">
                  <label className="form-label">Хичээл</label>
                  <input className="form-input" placeholder="жн: Англи хэл" value={info.subject} onChange={e => setInfo(p => ({...p, subject: e.target.value}))} />
                </div>
              </div>
              <div className="form-row">
                <div className="form-group">
                  <label className="form-label">Хугацаа (минут)</label>
                  <input className="form-input" type="number" min="5" max="180" value={info.duration} onChange={e => setInfo(p => ({...p, duration: +e.target.value}))} />
                </div>
                <div className="form-group">
                  <label className="form-label">Тэнцэх онооны босго (%)</label>
                  <input className="form-input" type="number" min="0" max="100" value={info.passingScore} onChange={e => setInfo(p => ({...p, passingScore: +e.target.value}))} />
                </div>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',marginTop:8}}>
                <button className="btn btn-outline" onClick={onCancel}>Болих</button>
                <button className="btn btn-primary" onClick={() => setStep(2)} disabled={!info.title.trim()}>Дараах →</button>
              </div>
            </div>
          )}

          {step === 2 && (
            <AIParseStep
              apiKey={apiKey}
              onParsed={handleParsed}
              onManual={handleManual}
              onBack={() => setStep(1)}
              variantCount={variantCount}
              onVariantCountChange={addVariant}
            />
          )}

          {step === 3 && (
            <div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                <div>
                  <div className="card-title">{info.title}</div>
                  <div style={{fontSize:'0.82rem',color:'var(--text2)',marginTop:3}}>
                    {(variants[activeVar]?.questions || []).filter(q=>q.text).length} асуулт · {info.duration} мин · {info.subject}
                    {' · '}<span style={{fontWeight:800,color:'var(--violet)'}}>Одоо {variants[activeVar]?.label || alpha(activeVar)} хувилбар бөглөж байна ({activeVar+1}/{variantCount})</span>
                  </div>
                </div>
                <div style={{display:'flex',gap:10}}>
                  <button className="btn btn-outline btn-sm" onClick={() => setStep(2)}>← Засах</button>
                  <button className="btn btn-green" onClick={handlePublish} disabled={saving}>
                    {saving ? '...' : '🚀 Нийтлэх'}
                  </button>
                </div>
              </div>

              <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:14}}>
                {variants.map((v, idx) => (
                  <button
                    key={idx}
                    className={`btn btn-sm ${idx === activeVar ? 'btn-violet' : 'btn-outline'}`}
                    onClick={() => setActiveVar(idx)}
                  >
                    {v.label || alpha(idx)} хувилбар ({(v.questions||[]).filter(q=>q.text).length})
                  </button>
                ))}
                {variantCount < 5 && (
                  <button className="btn btn-outline btn-sm" onClick={addVariant}>➕ Хувилбар нэмэх</button>
                )}
              </div>

              <QuestionEditor
                questions={variants[activeVar]?.questions || []}
                onChange={(qs) => setVariants(prev => prev.map((v, idx) => idx === activeVar ? ({...v, questions: qs}) : v))}
              />
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── QR MODAL ─────────────────────────────────────────────────────────────────
function QRModal({ exam, onClose }) {
  const [step, setStep] = useState('confirm');
  const qrRef = useRef(null);
  const [joins, setJoins] = useState([]); // {id, name, cls, at}
  const [joinCount, setJoinCount] = useState(0);
  const channelRef = useRef(null);

  const addJoin = useCallback((payload, id) => {
    if (!payload?.name) return;
    setJoins(prev => {
      const key = id || (payload.name + '|' + (payload.cls || '') + '|' + (payload.at || ''));
      if (prev.some(p => p.id === key)) return prev;
      return [{ id: key, name: payload.name, cls: payload.cls || '—', at: payload.at || Date.now() }, ...prev].slice(0, 30);
    });
  }, []);

  // Listen for students who entered name/class (BroadcastChannel: same-origin tabs)
  useEffect(() => {
    if (!exam?.id) return;
    try {
      const bc = new BroadcastChannel('se_join_' + exam.id);
      channelRef.current = bc;
      bc.onmessage = (ev) => {
        if (ev?.data?.type === 'JOIN') addJoin(ev.data.payload, ev.data.payload?.id);
      };
      return () => { try { bc.close(); } catch {} };
    } catch {
      // BroadcastChannel not available -> ignore
    }
  }, [exam?.id, addJoin]);

  // Realtime join list across devices via Firebase RTDB (optional)
  useEffect(() => {
    if (!exam?.id) return;
    const db = getDb();
    if (!db) return;
    try {
      // reset when switching exams / reopening
      setJoins([]);
      setJoinCount(0);

      const ref = roomRef(db, exam.id).child('joins').limitToLast(60);
      const onAdd = ref.on('child_added', (snap) => {
        const v = snap.val();
        addJoin(v, snap.key);
        setJoinCount(c => c + 1);
      });
      return () => { try { ref.off('child_added', onAdd); } catch {} };
    } catch {}
  }, [exam?.id, addJoin]);

  useEffect(() => {
    if (step !== 'qr' || !qrRef.current) return;
    qrRef.current.innerHTML = '';
    try {
      const base = window.location.origin + window.location.pathname;
      const packed = packExamForQR(exam);
      const data = LZString.compressToEncodedURIComponent(JSON.stringify(packed));
      const url = base + '#qr=' + data;
      new QRCode(qrRef.current, {
        text: url,
        width: 240, height: 240,
        colorDark: '#1e293b', colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.L
      });
    } catch(e) { qrRef.current.innerHTML = '<div style="color:red">QR үүсгэхэд алдаа гарлаа</div>'; }
  }, [step]);

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        {step === 'confirm' ? (
          <>
            <div className="modal-head">
              <div style={{fontFamily:'Outfit',fontWeight:800,fontSize:'1.1rem'}}>📱 QR код үүсгэх</div>
            </div>
            <div className="modal-body">
              <div style={{fontSize:'0.95rem',marginBottom:10}}>
                <strong>"{exam.title}"</strong> шалгалтын QR кодыг үүсгэх үү?
              </div>
              <div style={{fontSize:'0.85rem',color:'var(--text2)',lineHeight:1.7}}>
                Сурагчид QR кодыг уншуулахад шалгалт шууд нээгдэнэ.<br/>
                Нэр, анги оруулахад тест автоматаар эхэлнэ.
              </div>
            </div>
            <div className="modal-foot">
              <button className="btn btn-outline" onClick={onClose}>Болих</button>
              <button className="btn btn-primary" onClick={() => setStep('qr')}>✓ Тийм, үүсгэх</button>
            </div>
          </>
        ) : (
          <>
            <div className="modal-head">
              <div>
                <div style={{fontFamily:'Outfit',fontWeight:800,fontSize:'1.1rem'}}>📱 {exam.title}</div>
                <div style={{fontSize:'0.8rem',color:'var(--text2)'}}>Сурагчид доорх QR кодыг уншуулна уу</div>
              </div>
            </div>
            <div className="modal-body" style={{textAlign:'center',padding:'28px 24px'}}>
              <div className="qr-wrap" style={{marginBottom:16}}>
                <div ref={qrRef} />
              </div>

              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:10,margin:'0 auto 10px',maxWidth:360}}>
                <div style={{fontSize:'0.82rem',color:'var(--text2)',textAlign:'left'}}>
                  👥 Орсон: <strong style={{color:'var(--text)'}}>{joinCount || joins.length}</strong>
                </div>
                <div style={{fontSize:'0.78rem',color:'var(--text3)'}}>Нэр/анги оруулсан сурагчид</div>
              </div>

              {joins.length > 0 && (
                <div style={{maxWidth:360,margin:'0 auto 14px',textAlign:'left',border:'1px solid var(--border)',borderRadius:12,overflow:'hidden'}}>
                  {joins.slice(0, 8).map((j, idx) => (
                    <div key={idx} style={{display:'flex',justifyContent:'space-between',gap:10,padding:'8px 12px',background: idx % 2 ? 'var(--surface2)' : 'white'}}>
                      <div style={{fontWeight:700,fontSize:'0.85rem',color:'var(--text)'}}>{j.name}</div>
                      <div style={{fontFamily:'monospace',fontSize:'0.82rem',color:'var(--text2)'}}>{j.cls}</div>
                    </div>
                  ))}
                </div>
              )}

              <div style={{fontSize:'0.82rem',color:'var(--text2)',marginTop:8}}>
                ❓ {(normalizeVariants(exam)[0]?.questions || []).length} асуулт &nbsp;·&nbsp; ⏱ {exam.duration} мин &nbsp;·&nbsp; 📚 {exam.subject}
              </div>
              <div style={{marginTop:12,fontSize:'0.78rem',color:'var(--text3)'}}>
                Сурагч уншуулмагц нэр, ангиа оруулаад шалгалт эхэлнэ
              </div>
            </div>
            <div className="modal-foot">
              <button className="btn btn-primary" onClick={onClose}>Хаах</button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

function QRRoomLoader({ roomID, onLoaded, onBack }) {
  const [err, setErr] = useState('');
  useEffect(() => {
    const db = getDb();
    if (!db) { setErr('Firebase холболт алга'); return; }
    try {
      const ref = roomRef(db, roomID);
      ref.once('value')
        .then(snap => {
          const val = snap.val();
          if (!val || !val.versions) throw new Error('Room олдсонгүй');
          onLoaded(val);
        })
        .catch(e => setErr(e.message || 'Алдаа'));
    } catch(e) {
      setErr(e.message || 'Алдаа');
    }
  }, [roomID, onLoaded]);

  return (
    <div className="modal-overlay">
      <div className="modal" style={{maxWidth:420}}>
        <div className="modal-head">
          <div style={{fontFamily:'Outfit',fontWeight:800,fontSize:'1.1rem'}}>⏳ Room ачаалж байна...</div>

        <div className="modal-body">
          {err ? (
            <div style={{color:'var(--red)',fontWeight:700}}>⚠ {err}</div>

          )}
        </div>
        <div className="modal-foot">
          <button className="btn btn-outline" onClick={onBack}>← Буцах</button>
        </div>
      </div>
    </div>
  );
}

                      const took = typeof s.timeSpentSec === 'number' ? fmtDur(s.timeSpentSec) : '—';
                      const vlabel = s.variantLabel || 'A';
                      return (
                      <tr key={s.id} className={cheatCnt > 0 ? 'cheat-row-bad' : ''}>
                        <td style={{color:'var(--text3)',fontWeight:600}}>{i+1}</td>
                        <td><strong>{s.studentName}</strong></td>
                        <td>{s.studentClass || '—'}</td>
                        <td>
                          <span className="badge badge-violet" style={{fontFamily:'monospace',fontWeight:800}}>{vlabel}</span>
                        </td>
                        <td>
                          <span style={{fontFamily:'Outfit',fontWeight:700,fontSize:'1rem',color: s.score >= view.exam.passingScore ? 'var(--green)' : 'var(--red)'}}>
                            {s.score}%
                          </span>
                          <div style={{color:'var(--text3)',fontSize:'0.75rem',marginTop:2}}>
                            {s.correctCount}/{s.totalCount}
                            {' · '}
                            <span style={{fontWeight:700,color: s.score >= view.exam.passingScore ? 'var(--green)' : 'var(--red)'}}>
                              {s.score >= view.exam.passingScore ? 'Тэнцсэн' : 'Тэнцээгүй'}
                            </span>
                          </div>
                        </td>
                        <td style={{fontFamily:'monospace',fontSize:'0.9rem',color:'var(--text2)'}}>{took}</td>
                        <td>
                          <span className={`cheat-pill ${pillCls}`} onClick={() => setCheatSub(s)}>
                            {cheatCnt === 0 ? '✓ Цэвэр' : `⚠ ${cheatCnt} удаа`}
                          </span>
                        </td>
                        <td style={{color:'var(--text3)',fontSize:'0.8rem'}}>{new Date(s.submittedAt).toLocaleString('mn-MN')}</td>
                      </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
        {cheatSub && <CheatDetailModal sub={cheatSub} onClose={() => setCheatSub(null)} />}
      </div>
    );
  }

  return (
    <div>
      {qrExam && <QRModal exam={qrExam} onClose={() => setQrExam(null)} />}
      {cheatSub && <CheatDetailModal sub={cheatSub} onClose={() => setCheatSub(null)} />}
      {delExam && (

      <div className="page-header">

          <div>

// ─── EXAM TAKER ───────────────────────────────────────────────────────────────
function ExamTaker({ exam, studentName, studentClass, onSubmit, onBack }) {
  const [answers, setAnswers] = useState({});
  const [timeLeft, setTimeLeft] = useState(exam.duration * 60);
  const [submitted, setSubmitted] = useState(false);
  const [showConfirm, setShowConfirm] = useState(false);
  const [cheatLog, setCheatLog] = useState([]);
  const [cheatWarning, setCheatWarning] = useState('');
  const [showFlash, setShowFlash] = useState(false);
  const submittedRef = useRef(false);
  const cheatLogRef = useRef([]);
  const startMsRef = useRef(Date.now());

  const orderedQuestions = useMemo(() => exam.questions || [], [exam]);

  const logCheat = useCallback((type, detail) => {
    if (submittedRef.current) return;
    const entry = { type, detail, time: new Date().toISOString() };
    cheatLogRef.current = [...cheatLogRef.current, entry];
    setCheatLog([...cheatLogRef.current]);
    setCheatWarning(detail);
    setShowFlash(true);
    setTimeout(() => setCheatWarning(''), 3500);
    setTimeout(() => setShowFlash(false), 400);
  }, []);

  // Timer
  useEffect(() => {
    if (submitted) return;
    const t = setInterval(() => {
      setTimeLeft(s => {
        if (s <= 1) { clearInterval(t); doSubmit({}); return 0; }
        return s - 1;
      });
    }, 1000);
    return () => clearInterval(t);
  }, [submitted]);

  // Anti-cheat: tab switch
  useEffect(() => {
    const onVis = () => { if (document.hidden) logCheat('TAB_SWITCH', '🔀 Таб сэлгэсэн — чит илрэв!'); };
    document.addEventListener('visibilitychange', onVis);
    return () => document.removeEventListener('visibilitychange', onVis);
  }, [logCheat]);

  // Anti-cheat: window blur (screen split, other app)
  useEffect(() => {
    const onBlur = () => logCheat('WINDOW_BLUR', '👁 Цонхноос гарсан — чит илрэв!');
    window.addEventListener('blur', onBlur);
    return () => window.removeEventListener('blur', onBlur);
  }, [logCheat]);

  // Anti-cheat: copy
  useEffect(() => {
    const onCopy = () => logCheat('COPY', '📋 Текст хуулсан — чит илрэв!');
    document.addEventListener('copy', onCopy);
    return () => document.removeEventListener('copy', onCopy);
  }, [logCheat]);

  // Anti-cheat: right click
  useEffect(() => {
    const onRC = e => { e.preventDefault(); logCheat('RIGHT_CLICK', '🖱 Баруун товчлуур дарсан — чит илрэв!'); };
    document.addEventListener('contextmenu', onRC);
    return () => document.removeEventListener('contextmenu', onRC);
  }, [logCheat]);

  // Anti-cheat: Google Translate detection
  useEffect(() => {
    const obs = new MutationObserver(() => {
      const cls = document.documentElement.className;
      if (cls.includes('translated')) logCheat('TRANSLATE', '🌐 Google Translate ашигласан — чит илрэв!');
    });
    obs.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
    return () => obs.disconnect();
  }, [logCheat]);

  // Anti-cheat: suspicious resize / split-screen (best-effort heuristic)
  useEffect(() => {
    let last = { w: window.innerWidth, h: window.innerHeight };
    const onResize = () => {
      const w = window.innerWidth;
      const h = window.innerHeight;
      const dw = Math.abs(w - last.w);
      const dh = Math.abs(h - last.h);
      last = { w, h };
      const sw = window.screen?.width || w;
      const sh = window.screen?.height || h;
      const ratioW = w / sw;
      const ratioH = h / sh;
      if (dw + dh < 140) return; // ignore tiny resizes
      if (ratioW < 0.78 || ratioH < 0.78) {
        logCheat('SPLIT_SCREEN', '🪟 Дэлгэц хуваасан / цонх жижигрүүлсэн — чит сэжиг!');
      } else {
        logCheat('RESIZE', '↔️ Цонхны хэмжээ өөрчилсөн — чит сэжиг!');
      }
    };
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, [logCheat]);

  const doSubmit = useCallback((extraAnswers) => {
    if (submittedRef.current) return;
    submittedRef.current = true;
    const ans = { ...answers, ...extraAnswers };
    const qs = orderedQuestions.filter(q => q.answer);
    const correct = qs.filter(q => ans[q.id] === q.answer).length;
    const total = qs.length || orderedQuestions.length;
    const score = total > 0 ? Math.round((correct / total) * 100) : 0;
    const timeSpentSec = Math.round((Date.now() - startMsRef.current) / 1000);
    setSubmitted(true);
    const submission = {
      id: uid(),
      examId: exam.id,
      studentName,
      studentClass,
      answers: ans,
      score,
      correctCount: correct,
      totalCount: total,
      timeSpentSec,
      variantIndex: exam.variantIndex ?? 0,
      variantLabel: exam.variantLabel || alpha(exam.variantIndex ?? 0),
      cheatLog: cheatLogRef.current,
      submittedAt: new Date().toISOString()
    };

    // Persist to Firebase RTDB so teacher sees results across devices
    const db = getDb();
    if (db) {
      try {
        roomRef(db, exam.id).child('submissions').child(submission.id).set({
          ...submission,
          studentVersion: submission.variantLabel
        });
      } catch {}
    }

    onSubmit(submission);
  }, [answers, exam, orderedQuestions, studentName, studentClass, onSubmit]);

  const answered = Object.keys(answers).length;
  const total = orderedQuestions.length;
  const timerClass = timeLeft < 60 ? 'danger' : timeLeft < 300 ? 'warn' : '';
  const cheatCnt = cheatLog.length;

  return (
    <div>
      {/* Cheat flash overlay */}
      {showFlash && <div className="cheat-overlay" />}

      {/* Cheat warning toast */}
      {cheatWarning && (
        <div className="cheat-warning">
          <span className="cheat-badge">⚠ ЧИТ</span>
          {cheatWarning}
        </div>
      )}

      {/* Confirm dialog */}
      {showConfirm && (
        <div className="modal-overlay">
          <div className="modal" style={{maxWidth:400}}>
            <div className="modal-head"><div style={{fontFamily:'Outfit',fontWeight:800}}>⚠️ Шалгалт дуусгах уу?</div></div>
            <div className="modal-body">
              <p style={{fontSize:'0.9rem',color:'var(--text2)'}}>
                {answered < total
                  ? `Та ${total - answered} асуултанд хариулаагүй байна. Шалгалтыг дуусгахуу?`
                  : 'Бүх асуултанд хариуллаа. Шалгалтыг дуусгахуу?'}
              </p>
            </div>
            <div className="modal-foot">
              <button className="btn btn-outline" onClick={() => setShowConfirm(false)}>Үргэлжлүүлэх</button>
              <button className="btn btn-green" onClick={() => doSubmit({})}>✓ Дуусгах</button>
            </div>
          </div>
        </div>
      )}

      <div className="exam-header-bar">
        <div>
          <div className="exam-title-bar">{exam.title}</div>
          <div style={{fontSize:'0.78rem',color:'var(--text2)'}}>
            {answered}/{total} хариуллаа
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          {cheatCnt > 0 && (
            <div style={{background:'var(--red-light)',color:'var(--red)',padding:'5px 12px',borderRadius:20,fontSize:'0.78rem',fontWeight:700}}>
              ⚠ {cheatCnt} чит
            </div>
          )}
          <div className={`timer-badge ${timerClass}`}>
            ⏱ {fmt(timeLeft)}
          </div>
          <button className="btn btn-green btn-sm" onClick={() => setShowConfirm(true)}>✓ Дуусгах</button>
        </div>
      </div>

      {/* Progress */}
      <div style={{padding:'8px 24px',background:'white',borderBottom:'1px solid var(--border)'}}>
        <div className="progress-bar-wrap">
          <div className="progress-bar-fill" style={{width: `${(answered/total)*100}%`}} />
        </div>
        <div style={{fontSize:'0.75rem',color:'var(--text3)',textAlign:'right'}}>{answered}/{total}</div>
      </div>

      <div className="container-sm" style={{padding:'24px 20px'}}>
        {orderedQuestions.map((q, qi) => (
          <div className={`question-block ${answers[q.id] ? 'answered' : ''}`} key={q.id}>
            <div style={{display:'flex',gap:10,marginBottom:12}}>
              <span className="q-num">#{q.id}</span>
              {answers[q.id] && <span style={{fontSize:'0.75rem',color:'var(--green)',fontWeight:600,display:'flex',alignItems:'center',gap:4}}>✓ Хариуллаа</span>}
            </div>
            <div className="q-text" style={{fontSize:'0.95rem',marginBottom:14}}>{q.text}</div>
            {q.options.map(opt => (
              <button
                key={opt.key}
                className={`student-option ${answers[q.id] === opt.key ? 'selected' : ''}`}
                onClick={() => setAnswers(a => ({...a, [q.id]: opt.key}))}
              >
                <div className="opt-radio" />
                <span style={{fontWeight:600,color:'var(--text2)',minWidth:16}}>{opt.key})</span>
                <span>{opt.text}</span>
              </button>
            ))}
          </div>
        ))}

        <div style={{textAlign:'center',padding:'20px 0 40px'}}>
          <button className="btn btn-green btn-lg" onClick={() => setShowConfirm(true)} style={{minWidth:200}}>
            ✓ Шалгалт дуусгах
          </button>
        </div>
      </div>
    </div>
  );
}

            <div className="score-label">{pass ? 'ТЭНЦСЭН' : 'ТЭНЦЭЭГҮЙ'}</div>
          </div>
          <h2 style={{fontFamily:'Outfit',fontWeight:800,fontSize:'1.3rem',marginBottom:6}}>
            {pass ? '🎉 Амжилт!' : '📚 Дахин хичээлийн хэрэгтэй'}
          </h2>
          <div style={{fontSize:'0.9rem',color:'var(--text2)',marginBottom:14}}>
            {submission.studentName} · {exam.title}
          </div>
          <div style={{display:'flex',justifyContent:'center',gap:24,fontSize:'0.9rem'}}>
            <span><strong style={{color:'var(--green)'}}>{submission.correctCount}</strong> зөв</span>
            <span><strong style={{color:'var(--red)'}}>{submission.totalCount - submission.correctCount}</strong> буруу</span>
            <span>Нийт <strong>{submission.totalCount}</strong></span>
          </div>
        </div>

        <div className="card mb-3">
          <div className="card-header"><div className="card-title">📝 Асуулт тус бүрийн үр дүн</div></div>
          <div className="card-body" style={{padding:'14px'}}>
            {exam.questions.map(q => {
              const ua = submission.answers[q.id];
              const correct = q.answer ? ua === q.answer : null;
              return (
                <div key={q.id} style={{borderBottom:'1px solid var(--border)',paddingBottom:12,marginBottom:12}}>
                  <div style={{display:'flex',gap:8,alignItems:'flex-start',marginBottom:8}}>
                    <span className="q-num">#{q.id}</span>
                    {q.answer && (
                      <span style={{fontSize:'0.75rem',fontWeight:700,color: correct ? 'var(--green)' : 'var(--red)'}}>
                        {correct ? '✓ Зөв' : '✗ Буруу'}
                      </span>
                    )}
                    {!q.answer && <span style={{fontSize:'0.75rem',color:'var(--text3)'}}>— Оноогүй асуулт</span>}
                  </div>
                  <div style={{fontSize:'0.875rem',color:'var(--text)',marginBottom:10}}>{q.text}</div>
                  <div style={{display:'flex',flexDirection:'column',gap:5}}>
                    {q.options.map(opt => {
                      const isUser = ua === opt.key;
                      const isAnswer = q.answer === opt.key;
                      let cls = 'student-option';
                      if (isAnswer) cls += ' correct-show';
                      else if (isUser && !isAnswer) cls += ' wrong-show';
                      return (
                        <div key={opt.key} className={cls} style={{cursor:'default'}}>
                          <div className="opt-radio" />
                          <span style={{fontWeight:600,color:'var(--text2)',minWidth:16}}>{opt.key})</span>
                          <span>{opt.text}</span>
                          {isAnswer && <span style={{marginLeft:'auto',fontSize:'0.72rem',fontWeight:700,color:'var(--green)'}}>✓ зөв</span>}
                          {isUser && !isAnswer && <span style={{marginLeft:'auto',fontSize:'0.72rem',fontWeight:700,color:'var(--red)'}}>← таны хариулт</span>}
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        <div style={{textAlign:'center',paddingBottom:40}}>
          <button className="btn btn-violet btn-lg" onClick={onHome}>🏠 Үндсэн хуудас руу буцах</button>
        </div>
      </div>
    </div>
  );
}

// ─── QR STUDENT LOGIN ─────────────────────────────────────────────────────────
function QRStudentLogin({ exam, onStart, onBack }) {
  const [name, setName] = useState('');
  const [cls, setCls] = useState('');
  const qCount = (exam.questions || []).length;

  const announceJoin = useCallback((n, c) => {
    try {
      const bc = new BroadcastChannel('se_join_' + exam.id);
      bc.postMessage({ type: 'JOIN', payload: { name: n, cls: c || '', at: Date.now() } });
      bc.close();
    } catch {}

    const db = getDb();
    if (db) {
      try {
        roomRef(db, exam.roomID || exam.id).child('joins').push({
          name: n,
          cls: c || '',
          at: firebase.database.ServerValue.TIMESTAMP
        });
      } catch {}
    }
  }, [exam?.id]);

  return (
    <div style={{minHeight:'100vh',background:'linear-gradient(160deg,#eef2ff,#f5f0ff)',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div className="modal" style={{maxWidth:420}}>
        <div className="modal-head">
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div style={{width:48,height:48,borderRadius:12,background:'linear-gradient(135deg,var(--primary),var(--violet))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.4rem'}}>📱</div>
            <div>
              <div style={{fontFamily:'Outfit',fontWeight:800,fontSize:'1.1rem'}}>QR Шалгалт</div>
              <div style={{fontSize:'0.8rem',color:'var(--text2)'}}>{exam.title}</div>
            </div>
          </div>
        </div>
        <div className="modal-body">
          <div style={{background:'var(--violet-light)',borderRadius:10,padding:'12px 16px',marginBottom:18,fontSize:'0.85rem',color:'#4c3db0',lineHeight:1.6}}>
            📋 <strong>{qCount} асуулт</strong> &nbsp;·&nbsp; ⏱ <strong>{exam.duration} мин</strong> &nbsp;·&nbsp; 📚 {exam.subject}
          </div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Таны нэр</label>
              <input className="form-input" placeholder="Бүтэн нэр" value={name} onChange={e => setName(e.target.value)} autoFocus />
            </div>
            <div className="form-group">
              <label className="form-label">Анги</label>
              <input className="form-input" placeholder="жн: 8а" value={cls} onChange={e => setCls(e.target.value)} onKeyDown={e => e.key === 'Enter' && name.trim() && onStart(name.trim(), cls.trim())} />
            </div>
          </div>
        </div>
        <div className="modal-foot">
          <button className="btn btn-ghost" onClick={onBack}>← Буцах</button>
          <button
            className="btn btn-violet btn-lg"
            onClick={() => { const n=name.trim(); const c=cls.trim(); announceJoin(n, c); onStart(n, c); }}
            disabled={!name.trim()}
          >
            ▶ Шалгалт эхлэх
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
function App() {
  const [exams, setExams] = useLS('se_exams', []);
  const [submissions, setSubmissions] = useLS('se_submissions', []);
  const [apiKey, setApiKey] = useState(() => localStorage.getItem('se_apikey') || '');
  const [qrExam, setQrExam] = useState(null); // exam loaded from QR URL

  const [page, setPage] = useState({ type: 'landing' });
  const [roomLoaded, setRoomLoaded] = useState(null); // {roomID,title,subject,duration,passingScore,versions}

  const withRandomVariant = useCallback((roomExam) => {
    const versions = roomExam?.versions || {};
    const keys = Object.keys(versions).sort();
    const idx = Math.floor(Math.random() * Math.max(1, keys.length));
    const label = keys[idx] || 'A';
    const questions = unpackQuestions(versions[label] || []);
    return {
      id: roomExam.roomID,
      title: roomExam.title,
      subject: roomExam.subject,
      duration: roomExam.duration,
      passingScore: roomExam.passingScore,
      variantLabel: label,
      questions
    };
  }, []);

  // Handle QR URL hash on load
  useEffect(() => {
    const hash = window.location.hash;
    if (hash.startsWith('#qr=')) {
      try {
        const compressed = hash.slice(4);
        const json = LZString.decompressFromEncodedURIComponent(compressed);
        const packed = JSON.parse(json);
        const parsed = unpackExamFromQR(packed);
        if (parsed?.roomID) {
          setPage({ type: 'qrRoom', roomID: parsed.roomID });
          window.location.hash = '';
        }
      } catch(e) { console.error('QR decode error', e); }
    }
  }, []);

  const goHome = () => { setQrExam(null); setPage({ type: 'landing' }); };

  const deleteExam = useCallback((exam) => {
    if (!exam?.id) return;
    setExams(prev => prev.filter(e => e.id !== exam.id));
    setSubmissions(prev => prev.filter(s => s.examId !== exam.id));
    const db = getDb();
    if (db) {
      try { roomRef(db, exam.id).remove(); } catch {}
    }
  }, [setExams, setSubmissions]);

  // Result page: special full-page rendering
  if (page.type === 'result') {
    return <ResultPage submission={page.submission} exam={page.exam} onHome={goHome} />;
  }

  // Exam taking: full-page
  if (page.type === 'exam') {
    return (
      <div>
        <ExamTaker
          exam={page.exam}
          studentName={page.studentName}
          studentClass={page.studentClass}
          onSubmit={sub => {
            setSubmissions(s => [...s, sub]);
            setPage({ type: 'result', submission: sub, exam: page.exam });
          }}
          onBack={() => setPage({ type: 'landing' })}
        />
      </div>
    );
  }

  // Exam intro
  if (page.type === 'examIntro') {
    return (
      <div>
        <Topbar userName={page.studentName} role="student" onHome={goHome} />
        <ExamIntro
          exam={page.exam}
          studentName={page.studentName}
          studentClass={page.studentClass}
          onStart={() => setPage({ ...page, type: 'exam' })}
          onBack={() => setPage({ type: 'student' })}
        />
      </div>
    );
  }

  return (
    <div className="app">
      {page.type === 'landing' && (
        <>
          <LandingPage onSelect={role => {
            if (role === 'teacher') setPage({ type: 'teacherLogin' });
            else setPage({ type: 'student' });
          }} />
        </>
      )}

      {page.type === 'teacherLogin' && (
        <>
          <LandingPage onSelect={() => {}} />
          <TeacherLogin
            onLogin={(name, key) => {
              if (key) setApiKey(key);
              setPage({ type: 'teacherDash', name });
            }}
          />
        </>
      )}

      {page.type === 'teacherDash' && (
        <div>
          <Topbar
            userName={page.name}
            role="teacher"
            onHome={goHome}
          />
          <div className="container-lg" style={{paddingTop:8}}>
            <TeacherDashboard
              exams={exams}
              submissions={submissions}
              apiKey={apiKey}
              teacherName={page.name}
              onCreateExam={() => setPage({ ...page, type: 'createExam' })}
              onApiKey={k => { setApiKey(k); localStorage.setItem('se_apikey', k); }}
              onDeleteExam={deleteExam}
            />
          </div>
        </div>
      )}

      {page.type === 'createExam' && (
        <div>
          <Topbar userName={page.name} role="teacher" onHome={goHome} />
          <div className="container-sm" style={{paddingTop:8, paddingBottom:40}}>
            <CreateExam
              apiKey={apiKey}
              onSave={exam => {
                setExams(e => [...e, exam]);
                setPage({ type: 'teacherDash', name: page.name });
              }}
              onCancel={() => setPage({ type: 'teacherDash', name: page.name })}
            />
          </div>
        </div>
      )}

      {page.type === 'student' && (
        <div>
          <Topbar onHome={goHome} />
          <StudentPortal
            exams={exams}
            onStartExam={(exam, name, cls) =>
              setPage({ type: 'examIntro', exam: withRandomVariant(exam), studentName: name, studentClass: cls })
            }
            onBack={goHome}
          />
        </div>
      )}

      {page.type === 'qrRoom' && page.roomID && (
        <QRRoomLoader
          roomID={page.roomID}
          onLoaded={(roomExam) => { setRoomLoaded(roomExam); setPage({ type: 'qrStudent', exam: roomExam }); }}
          onBack={goHome}
        />
      )}

      {page.type === 'qrStudent' && page.exam && (
        <QRStudentLogin
          exam={page.exam}
          onStart={(name, cls) => setPage({ type: 'examIntro', exam: withRandomVariant(page.exam), studentName: name, studentClass: cls })}
          onBack={goHome}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
