<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartEXAM — Ухаалаг Шалгалтын Систем</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f4ff;
  --surface: #ffffff;
  --surface2: #f8faff;
  --border: #e2e8f5;
  --primary: #3b5bdb;
  --primary-light: #e8ecff;
  --primary-dark: #2f4bc4;
  --violet: #7c3aed;
  --violet-light: #f0ebff;
  --green: #059669;
  --green-light: #ecfdf5;
  --red: #dc2626;
  --red-light: #fef2f2;
  --amber: #d97706;
  --amber-light: #fffbeb;
  --text: #1e293b;
  --text2: #475569;
  --text3: #94a3b8;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(59,91,219,.06);
  --shadow-lg: 0 8px 32px rgba(59,91,219,.12);
  --radius: 14px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}
h1,h2,h3,h4 { font-family: 'Outfit', sans-serif; }

/* ─── LAYOUT ─────────────────────────────────── */
.app { min-height: 100vh; }
.container { max-width: 960px; margin: 0 auto; padding: 0 20px; }
.container-sm { max-width: 680px; margin: 0 auto; padding: 0 20px; }
.container-lg { max-width: 1100px; margin: 0 auto; padding: 0 20px; }

/* ─── TOPBAR ─────────────────────────────────── */
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 1px 0 var(--border);
}
.topbar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: 'Outfit', sans-serif;
  font-weight: 800;
  font-size: 1.15rem;
  color: var(--primary);
  cursor: pointer;
}
.brand-badge {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--primary), var(--violet));
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 0.7rem;
  font-weight: 900;
  letter-spacing: -.5px;
}
.topbar-right { display: flex; align-items: center; gap: 10px; }
.topbar-user {
  font-size: 0.85rem;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 8px;
}
.avatar {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: var(--primary-light);
  color: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  font-weight: 700;
}

/* ─── BUTTONS ────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 18px;
  border-radius: var(--radius-sm);
  border: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.875rem;
  font-weight: 500;
  cursor: pointer;
  transition: all .18s ease;
  white-space: nowrap;
  text-decoration: none;
}
.btn:disabled { opacity: .5; cursor: not-allowed; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover:not(:disabled) { background: var(--primary-dark); box-shadow: 0 4px 12px rgba(59,91,219,.35); transform: translateY(-1px); }
.btn-violet { background: var(--violet); color: white; }
.btn-violet:hover:not(:disabled) { background: #6d28d9; box-shadow: 0 4px 12px rgba(124,58,237,.35); transform: translateY(-1px); }
.btn-green { background: var(--green); color: white; }
.btn-green:hover:not(:disabled) { background: #047857; transform: translateY(-1px); }
.btn-outline { background: white; color: var(--text); border: 1.5px solid var(--border); }
.btn-outline:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
.btn-ghost { background: transparent; color: var(--text2); }
.btn-ghost:hover { background: var(--surface2); color: var(--text); }
.btn-red { background: var(--red-light); color: var(--red); }
.btn-red:hover:not(:disabled) { background: var(--red); color: white; }
.btn-lg { padding: 12px 24px; font-size: 1rem; border-radius: 10px; }
.btn-sm { padding: 6px 12px; font-size: 0.8rem; }

/* ─── CARDS ──────────────────────────────────── */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.card-header {
  padding: 18px 22px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-body { padding: 22px; }
.card-title { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1rem; color: var(--text); }

/* ─── FORM ───────────────────────────────────── */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 0.825rem; font-weight: 600; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
.form-input, .form-select, .form-textarea {
  width: 100%;
  padding: 10px 13px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  color: var(--text);
  background: white;
  transition: border-color .15s;
  outline: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59,91,219,.1); }
.form-textarea { resize: vertical; min-height: 140px; line-height: 1.6; }
.form-hint { font-size: 0.78rem; color: var(--text3); margin-top: 5px; }
.form-error { font-size: 0.78rem; color: var(--red); margin-top: 5px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

/* ─── BADGE ──────────────────────────────────── */
.badge {
  display: inline-flex; align-items: center;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 600;
  gap: 4px;
}
.badge-blue { background: var(--primary-light); color: var(--primary); }
.badge-violet { background: var(--violet-light); color: var(--violet); }
.badge-green { background: var(--green-light); color: var(--green); }
.badge-red { background: var(--red-light); color: var(--red); }
.badge-amber { background: var(--amber-light); color: var(--amber); }
.badge-gray { background: #f1f5f9; color: var(--text2); }

/* ─── LANDING ────────────────────────────────── */
.landing {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  background: linear-gradient(160deg, #eef2ff 0%, #f0f4ff 40%, #f5f0ff 100%);
  position: relative;
  overflow: hidden;
}
.landing::before {
  content: '';
  position: absolute;
  top: -100px;
  right: -100px;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(124,58,237,.08) 0%, transparent 70%);
  pointer-events: none;
}
.landing::after {
  content: '';
  position: absolute;
  bottom: -80px;
  left: -80px;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(59,91,219,.07) 0%, transparent 70%);
  pointer-events: none;
}
.landing-hero { text-align: center; margin-bottom: 48px; }
.logo-big {
  width: 72px; height: 72px;
  border-radius: 20px;
  background: linear-gradient(135deg, var(--primary) 0%, var(--violet) 100%);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 20px;
  box-shadow: 0 12px 32px rgba(59,91,219,.3);
  font-family: 'Outfit', sans-serif;
  font-weight: 900;
  font-size: 1.4rem;
  color: white;
  letter-spacing: -1px;
}
.landing-title {
  font-family: 'Outfit', sans-serif;
  font-weight: 900;
  font-size: 2.8rem;
  color: var(--text);
  letter-spacing: -1.5px;
  line-height: 1;
  margin-bottom: 8px;
}
.landing-sub {
  font-size: 1rem;
  color: var(--primary);
  font-weight: 600;
  margin-bottom: 12px;
}
.landing-desc { font-size: 0.95rem; color: var(--text2); max-width: 420px; }
.role-cards { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
.role-card {
  width: 220px;
  padding: 32px 24px;
  border-radius: 18px;
  border: 2px solid transparent;
  background: white;
  cursor: pointer;
  text-align: center;
  transition: all .22s ease;
  box-shadow: var(--shadow);
}
.role-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
.role-card.teacher:hover { border-color: var(--primary); }
.role-card.student:hover { border-color: var(--violet); }
.role-icon { font-size: 2.5rem; margin-bottom: 12px; }
.role-title { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1.2rem; color: var(--text); margin-bottom: 6px; }
.role-desc { font-size: 0.82rem; color: var(--text2); }

/* ─── PAGE HEADER ────────────────────────────── */
.page-header {
  padding: 28px 0 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 28px;
}
.page-title { font-weight: 800; font-size: 1.6rem; color: var(--text); }
.page-sub { font-size: 0.875rem; color: var(--text2); margin-top: 3px; }

/* ─── EXAM CARDS GRID ────────────────────────── */
.exam-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.exam-card {
  background: white;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  transition: all .18s;
  cursor: default;
  box-shadow: var(--shadow);
}
.exam-card:hover { border-color: var(--primary); box-shadow: var(--shadow-lg); }
.exam-card-title { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1rem; margin-bottom: 6px; }
.exam-card-meta { font-size: 0.8rem; color: var(--text2); display: flex; gap: 12px; flex-wrap: wrap; margin: 8px 0 12px; }
.exam-card-meta span { display: flex; align-items: center; gap: 4px; }
.exam-card-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

/* ─── STEP INDICATOR ─────────────────────────── */
.steps { display: flex; gap: 0; margin-bottom: 28px; }
.step {
  flex: 1;
  display: flex;
  align-items: center;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text3);
}
.step.active { color: var(--primary); }
.step.done { color: var(--green); }
.step-num {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--border);
  color: var(--text3);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem; font-weight: 700;
  margin-right: 8px;
  flex-shrink: 0;
}
.step.active .step-num { background: var(--primary); color: white; }
.step.done .step-num { background: var(--green); color: white; }
.step-line { flex: 1; height: 1px; background: var(--border); margin: 0 10px; }
.step:last-child .step-line { display: none; }

/* ─── AI PARSER ──────────────────────────────── */
.ai-hint-box {
  background: linear-gradient(135deg, var(--violet-light), #f0f4ff);
  border: 1.5px solid #d8c8ff;
  border-radius: var(--radius);
  padding: 16px 18px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  margin-bottom: 18px;
}
.ai-icon { font-size: 1.3rem; flex-shrink: 0; margin-top: 1px; }
.ai-hint-text { font-size: 0.85rem; color: #4c3db0; line-height: 1.5; }
.ai-hint-text strong { color: var(--violet); }
.parsing-overlay {
  text-align: center;
  padding: 48px 24px;
}
.spinner {
  width: 44px; height: 44px;
  border: 3px solid var(--violet-light);
  border-top-color: var(--violet);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── QUESTION PREVIEW ───────────────────────── */
.question-item {
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  background: white;
  margin-bottom: 12px;
  transition: border-color .15s;
}
.question-item:hover { border-color: var(--primary); }
.q-num { display: inline-block; background: var(--primary-light); color: var(--primary); font-size: 0.75rem; font-weight: 700; padding: 2px 8px; border-radius: 12px; margin-bottom: 8px; }
.q-text { font-size: 0.9rem; color: var(--text); line-height: 1.6; margin-bottom: 12px; }
.options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.option-item {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 7px 10px;
  border-radius: 8px;
  background: var(--surface2);
  font-size: 0.82rem;
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: all .12s;
}
.option-item.correct { background: var(--green-light); border-color: #6ee7b7; }
.option-key {
  width: 20px; height: 20px;
  border-radius: 50%;
  background: white;
  border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--text2);
  flex-shrink: 0;
  margin-top: 1px;
}
.option-item.correct .option-key { background: var(--green); border-color: var(--green); color: white; }

/* ─── ANSWER SELECT ──────────────────────────── */
.answer-select-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px dashed var(--border);
}
.answer-label { font-size: 0.78rem; color: var(--text2); font-weight: 600; }
.ans-btn {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: white;
  font-size: 0.75rem;
  font-weight: 700;
  cursor: pointer;
  transition: all .12s;
  display: flex; align-items: center; justify-content: center;
  color: var(--text2);
}
.ans-btn.selected { background: var(--green); border-color: var(--green); color: white; }
.ans-btn:hover:not(.selected) { border-color: var(--primary); color: var(--primary); }

/* ─── STUDENT EXAM ───────────────────────────── */
.exam-header-bar {
  background: white;
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 60px;
  z-index: 50;
}
.exam-title-bar { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1rem; }
.timer-badge {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 7px 14px;
  border-radius: 20px;
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 0.95rem;
  background: var(--primary-light);
  color: var(--primary);
}
.timer-badge.warn { background: var(--amber-light); color: var(--amber); }
.timer-badge.danger { background: var(--red-light); color: var(--red); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.7; } }

.exam-question-wrapper {
  padding: 24px 0;
}
.question-block {
  background: white;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 22px;
  margin-bottom: 14px;
  transition: border-color .15s;
}
.question-block.answered { border-color: #a5f3d8; }
.student-option {
  display: flex;
  align-items: flex-start;
  gap: 11px;
  padding: 10px 14px;
  border-radius: 10px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  cursor: pointer;
  margin-bottom: 7px;
  font-size: 0.875rem;
  transition: all .15s;
  text-align: left;
  width: 100%;
}
.student-option:hover { border-color: var(--primary); background: var(--primary-light); }
.student-option.selected { border-color: var(--primary); background: var(--primary-light); }
.student-option.correct-show { border-color: var(--green); background: var(--green-light); }
.student-option.wrong-show { border-color: var(--red); background: var(--red-light); }
.opt-radio {
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 2px solid var(--border);
  flex-shrink: 0;
  margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
  transition: all .12s;
}
.student-option.selected .opt-radio { border-color: var(--primary); background: var(--primary); }
.student-option.selected .opt-radio::after { content: ''; width: 7px; height: 7px; border-radius: 50%; background: white; }
.student-option.correct-show .opt-radio { border-color: var(--green); background: var(--green); }
.student-option.wrong-show .opt-radio { border-color: var(--red); background: var(--red); }

/* ─── PROGRESS BAR ───────────────────────────── */
.progress-bar-wrap { background: var(--border); border-radius: 6px; height: 6px; overflow: hidden; margin-bottom: 6px; }
.progress-bar-fill { height: 100%; border-radius: 6px; background: linear-gradient(90deg, var(--primary), var(--violet)); transition: width .3s ease; }

/* ─── RESULT PAGE ────────────────────────────── */
.result-hero {
  text-align: center;
  padding: 36px 24px 28px;
  background: linear-gradient(135deg, #eef2ff, #f5f0ff);
  border-radius: var(--radius);
  margin-bottom: 24px;
}
.score-circle {
  width: 110px; height: 110px;
  border-radius: 50%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  margin: 0 auto 16px;
  font-family: 'Outfit', sans-serif;
}
.score-circle.pass { background: linear-gradient(135deg, #d1fae5, #a7f3d0); border: 4px solid var(--green); }
.score-circle.fail { background: linear-gradient(135deg, #fee2e2, #fecaca); border: 4px solid var(--red); }
.score-pct { font-size: 2rem; font-weight: 900; line-height: 1; }
.score-circle.pass .score-pct { color: var(--green); }
.score-circle.fail .score-pct { color: var(--red); }
.score-label { font-size: 0.7rem; font-weight: 600; color: var(--text2); }

/* ─── SUBMISSIONS TABLE ──────────────────────── */
.sub-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
.sub-table th {
  padding: 10px 14px;
  background: var(--surface2);
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--text2);
  text-align: left;
  border-bottom: 2px solid var(--border);
}
.sub-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); color: var(--text); }
.sub-table tr:last-child td { border-bottom: none; }
.sub-table tr:hover td { background: var(--surface2); }

/* ─── SETTINGS MODAL ─────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(15,15,35,.45);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  z-index: 999;
  padding: 20px;
}
.modal {
  background: white;
  border-radius: 20px;
  width: 100%;
  max-width: 500px;
  box-shadow: 0 20px 60px rgba(0,0,0,.18);
  animation: modalIn .2s ease;
}
@keyframes modalIn { from { opacity:0; transform:scale(.96) translateY(10px); } to { opacity:1; transform:scale(1) translateY(0); } }
.modal-head {
  padding: 22px 24px 16px;
  border-bottom: 1px solid var(--border);
}
.modal-body { padding: 22px 24px; }
.modal-foot { padding: 14px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }

/* ─── EMPTY STATE ────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 56px 24px;
  color: var(--text2);
}
.empty-icon { font-size: 3rem; margin-bottom: 12px; opacity: .6; }
.empty-title { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.1rem; color: var(--text); margin-bottom: 6px; }
.empty-sub { font-size: 0.875rem; margin-bottom: 20px; }

/* ─── STATS STRIP ────────────────────────────── */
.stats-strip { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 24px; }
.stat-card {
  flex: 1; min-width: 130px;
  background: white;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  box-shadow: var(--shadow);
}
.stat-val { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1.8rem; line-height: 1; color: var(--text); }

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

// ─── UTILS ────────────────────────────────────────────────────────────────────
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);

const useLS = (key, init) => {
  const [val, setVal] = useState(() => {
    try {
      const s = localStorage.getItem(key);
      return s ? JSON.parse(s) : init;
    } catch { return init; }
  });
  const set = useCallback(v => {
    setVal(prev => {
      const next = typeof v === 'function' ? v(prev) : v;
      try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
      return next;
    });
  }, [key]);
  return [val, set];
};

const fmt = n => String(Math.floor(n / 60)).padStart(2, '0') + ':' + String(n % 60).padStart(2, '0');
const fmtDur = (sec) => {
  const s = Math.max(0, Math.floor(sec || 0));
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const r = s % 60;
  if (h > 0) return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0') + ':' + String(r).padStart(2, '0');
  return String(m).padStart(2, '0') + ':' + String(r).padStart(2, '0');
};

// ─── FIREBASE (built-in config) ───────────────────────────────────────────────
// Default Firebase config is embedded in code (no manual setup needed).
// You can still override it by setting localStorage key: se_firebase_config
const FIREBASE_DEFAULT_CONFIG = {
  apiKey: "AIzaSyAYewyWCkgMiPhZlybGaDA3J6XAXeYxVvM",
  authDomain: "smrtexm.firebaseapp.com",
  projectId: "smrtexm",
  storageBucket: "smrtexm.firebasestorage.app",
  messagingSenderId: "1085014532833",
  appId: "1:1085014532833:web:e9ca4fe4e00bbb30750da0",
  measurementId: "G-YJC8GK38PB",
  databaseURL: "https://smrtexm-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const getFirebaseConfig = () => {
  try {
    const raw = localStorage.getItem('se_firebase_config');
    if (raw) return JSON.parse(raw);
  } catch {}
  return FIREBASE_DEFAULT_CONFIG;
};
const hasFirebaseConfig = () => {
  const cfg = getFirebaseConfig();
  return !!(cfg && cfg.apiKey && cfg.projectId && (cfg.databaseURL || cfg.databaseUrl));
};
const getFirebaseApp = (() => {
  let app = null;
  return () => {
    if (app) return app;
    const cfg = getFirebaseConfig();
    if (!cfg) return null;
    const fixed = { ...cfg, databaseURL: cfg.databaseURL || cfg.databaseUrl };
    try {
      app = firebase.initializeApp(fixed, 'smartExam');
      return app;
    } catch (e) {
      try { app = firebase.app('smartExam'); return app; } catch { return null; }
    }
  };
})();
const getDb = () => {
  const app = getFirebaseApp();
  if (!app) return null;
  try { return firebase.database(app); } catch { return null; }
};
const deviceId = (() => {
  const k = 'se_device_id';
  const existing = localStorage.getItem(k);
  if (existing) return existing;
  const id = uid();
  try { localStorage.setItem(k, id); } catch {}
  return id;
})();

const alpha = (i) => String.fromCharCode(65 + (i % 26));

const normalizeVariants = (exam) => {
  // New format: exam.variants = [{label:'A', questions:[...]}]
  if (Array.isArray(exam?.variants) && exam.variants.length) {
    return exam.variants.map((v, idx) => ({
      label: v.label || alpha(idx),
      questions: Array.isArray(v.questions) ? v.questions : []
    }));
  }
  // Backward-compat: older exam only had questions (or variantOrders shuffle)
  if (Array.isArray(exam?.questions) && exam.questions.length) {
    return [{ label: 'A', questions: exam.questions }];
  }
  return [{ label: 'A', questions: [] }];
};

const roomRef = (db, roomID) => db.ref('activeRooms/' + roomID);
const packQuestions = (questions) => (questions || []).map(q => ({
  text: q.text || '',
  options: (q.options || []).map(o => ({ key: o.key, text: o.text || '' })),
  answer: q.answer ?? null
}));
const unpackQuestions = (questions) => (questions || []).map((q, idx) => ({
  id: idx + 1,
  text: q?.text || '',
  options: ['A', 'B', 'C', 'D'].map((key, oi) => {
    const hit = (q?.options || []).find(o => o?.key === key);
    const byIndex = q?.options?.[oi];
    return { key, text: (hit?.text ?? byIndex?.text ?? '') };
  }),
  answer: q?.answer ?? null
}));

const csvCell = (v) => {
  const s = (v ?? '').toString();
  const escaped = s.replace(/"/g, '""');
  return `"${escaped}"`;
};
const downloadCSV = (filename, rows) => {
  const bom = '\uFEFF'; // Excel UTF-8 BOM
  const csv = bom + rows.map(r => r.map(csvCell).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename.endsWith('.csv') ? filename : (filename + '.csv');
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
};

const normalizeClassKey = (name) => (name || '').trim().toLowerCase().replace(/\s+/g, '') || '';
const displayClassName = (key, fallback) => {
  const f = (fallback || key || '').trim();
  return f || '—';
};
const lastQrClassStorageKey = (examId) => 'se_qr_class_' + examId;

const submissionResultRows = (subs) => [
  ['Нэр', 'Анги', 'Хувилбар', 'Дүн (%)', 'Cheat (тоо)', 'Хугацаа', 'Огноо'],
  ...subs
    .slice()
    .sort((a, b) => new Date(a.submittedAt) - new Date(b.submittedAt))
    .map(s => ([
      s.studentName || '',
      s.studentClass || '',
      (s.variantLabel || s.studentVersion || ''),
      (typeof s.score === 'number' ? s.score : ''),
      ((s.cheatLog || []).length),
      (typeof s.timeSpentSec === 'number' ? fmtDur(s.timeSpentSec) : ''),
      (s.submittedAt ? new Date(s.submittedAt).toLocaleString('mn-MN') : '')
    ]))
];

const downloadExcelByClass = (baseName, subs) => {
  const byClass = {};
  subs.forEach(s => {
    const cls = (s.studentClass || 'Ангигүй').trim() || 'Ангигүй';
    if (!byClass[cls]) byClass[cls] = [];
    byClass[cls].push(s);
  });
  const classKeys = Object.keys(byClass).sort((a, b) => a.localeCompare(b, 'mn'));
  if (!classKeys.length) return;

  if (typeof XLSX !== 'undefined') {
    const wb = XLSX.utils.book_new();
    classKeys.forEach(cls => {
      const rows = submissionResultRows(byClass[cls]);
      const ws = XLSX.utils.aoa_to_sheet(rows);
      const sheetName = cls.replace(/[\\/*?:\[\]]/g, '_').slice(0, 31) || 'Angi';
      XLSX.utils.book_append_sheet(wb, ws, sheetName);
    });
    XLSX.writeFile(wb, (baseName.endsWith('.xlsx') ? baseName : baseName + '.xlsx'));
    return;
  }
  classKeys.forEach(cls => {
    downloadCSV(baseName + '_' + cls.replace(/[\\/:*?"<>|]+/g, '_'), submissionResultRows(byClass[cls]));
  });
};

// ─── QR PAYLOAD (compact) ─────────────────────────────────────────────────────
// Keep QR short enough to be reliably scannable.
const packExamForQR = (exam, classKey) => ({
  r: exam.id,
  c: classKey || ''
});

const unpackExamFromQR = (packed) => {
  return ({
    roomID: packed?.r || null,
    classKey: normalizeClassKey(packed?.c || '')
  });
};

// ─── VARIANT ASSIGNMENT (balanced across class) ───────────────────────────────
const getExamVariantLabels = (exam) => {
  if (exam?.versions && typeof exam.versions === 'object' && !Array.isArray(exam.versions)) {
    const keys = Object.keys(exam.versions).filter(k => {
      const v = exam.versions[k];
      return Array.isArray(v) && v.length > 0;
    });
    if (keys.length) return keys.sort();
  }
  return normalizeVariants(exam)
    .filter(v => (v.questions || []).some(q => (q.text || '').trim()))
    .map(v => v.label || 'A');
};

const buildExamWithVariant = (roomExam, label) => {
  const labels = getExamVariantLabels(roomExam);
  let questions = [];
  if (roomExam?.versions?.[label]) {
    questions = unpackQuestions(roomExam.versions[label]);
  } else {
    const hit = normalizeVariants(roomExam).find(v => (v.label || 'A') === label);
    questions = hit?.questions || [];
  }
  const variantIndex = Math.max(0, labels.indexOf(label));
  return {
    id: roomExam.roomID || roomExam.id,
    title: roomExam.title,
    subject: roomExam.subject,
    duration: roomExam.duration,
    passingScore: roomExam.passingScore,
    stopped: roomExam.stopped,
    variantLabel: label,
    variantIndex,
    questions
  };
};

const studentVariantKey = (roomId, studentName) => {
  const slug = (studentName || '').trim().toLowerCase().replace(/\s+/g, '_').slice(0, 48);
  return (deviceId + '_' + roomId + '_' + (slug || 'anon')).slice(0, 120);
};

/** Тэнцүү хуваарилалт: 40 хүүхэд → 20 A, 20 B; 41 → 21 + 20 (сонголт random) */
const assignBalancedVariant = (db, roomId, labels, studentName, classKey) => {
  if (!labels.length) return Promise.resolve('A');
  if (labels.length === 1) return Promise.resolve(labels[0]);
  if (!db || !roomId) {
    return Promise.resolve(labels[Math.floor(Math.random() * labels.length)]);
  }
  const ck = normalizeClassKey(classKey) || 'default';
  const key = studentVariantKey(roomId, studentName);
  const studentRef = roomRef(db, roomId).child('variantByStudent').child(ck).child(key);
  const allocRef = roomRef(db, roomId).child('variantAllocator').child(ck);

  return studentRef.once('value').then(snap => {
    const existing = snap.val();
    if (existing?.label && labels.includes(existing.label)) return existing.label;

    return allocRef.transaction(cur => {
      cur = cur || { counts: {} };
      const old = { ...(cur.counts || {}) };
      labels.forEach(l => { if (old[l] == null) old[l] = 0; });
      const min = Math.min(...labels.map(l => old[l]));
      const pool = labels.filter(l => old[l] === min);
      const pick = pool[Math.floor(Math.random() * pool.length)];
      const neu = { ...old, [pick]: old[pick] + 1 };
      return { counts: neu, lastPick: pick };
    }).then((result, committed, snap) => {
      if (!committed || !snap?.val()?.lastPick) {
        throw new Error('Хувилбар томилох transaction амжилтгүй');
      }
      const pick = snap.val().lastPick;
      return studentRef.set({
        label: pick,
        name: (studentName || '').trim(),
        at: firebase.database.ServerValue.TIMESTAMP
      }).then(() => pick);
    });
  });
};

// ─── OMR (OpenCV.js) ──────────────────────────────────────────────────────────
const OMR_Q_COUNT = 20;
const OMR_SHEET_W = 600;
const OMR_SHEET_H = 850;
const OMR_OPTS = ['A', 'B', 'C', 'D'];
const OMR_BUBBLE_X = [0.32, 0.46, 0.60, 0.74];
const OMR_ROW_Y0 = 0.24;
const OMR_ROW_Y1 = 0.93;
const OMR_BUBBLE_R = 0.018;

let openCvReadyPromise = null;
const loadOpenCv = () => {
  if (window.cv && window.cv.Mat) return Promise.resolve(window.cv);
  if (openCvReadyPromise) return openCvReadyPromise;
  openCvReadyPromise = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://docs.opencv.org/4.x/opencv.js';
    s.async = true;
    s.onload = () => {
      const wait = () => {
        if (window.cv && window.cv.Mat) resolve(window.cv);
        else if (window.cv && window.cv.onRuntimeInitialized) {
          window.cv.onRuntimeInitialized = () => resolve(window.cv);
        } else setTimeout(wait, 80);
      };
      wait();
    };
    s.onerror = () => reject(new Error('OpenCV.js ачаалахад алдаа'));
    document.head.appendChild(s);
  });
  return openCvReadyPromise;
};

const omrDefaultAnswerKey = () => Object.fromEntries(
  Array.from({ length: OMR_Q_COUNT }, (_, i) => [i + 1, ''])
);

const parseAnswerKeyText = (text) => {
  const key = omrDefaultAnswerKey();
  const parts = (text || '').split(/[\s,;]+/).filter(Boolean);
  parts.forEach(p => {
    const m = p.match(/^(\d{1,2})\s*[-:.]?\s*([A-Da-d])$/);
    if (m) {
      const n = parseInt(m[1], 10);
      if (n >= 1 && n <= OMR_Q_COUNT) key[n] = m[2].toUpperCase();
    }
  });
  return key;
};

const answerKeyToText = (key) => Object.entries(key)
  .filter(([, v]) => v)
  .map(([n, v]) => `${n}-${v}`)
  .join(', ');

const orderCorners = (pts) => {
  const sum = pts.map(p => p.x + p.y);
  const diff = pts.map(p => p.x - p.y);
  return {
    tl: pts[sum.indexOf(Math.min(...sum))],
    tr: pts[diff.indexOf(Math.max(...diff))],
    br: pts[sum.indexOf(Math.max(...sum))],
    bl: pts[diff.indexOf(Math.min(...diff))]
  };
};

const dist2 = (a, b) => (a.x - b.x) ** 2 + (a.y - b.y) ** 2;

const findCornerMarkers = (cv, binary, w, h) => {
  const contours = new cv.MatVector();
  const hierarchy = new cv.Mat();
  cv.findContours(binary, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
  const imgArea = w * h;
  const candidates = [];
  for (let i = 0; i < contours.size(); i++) {
    const cnt = contours.get(i);
    const area = cv.contourArea(cnt);
    if (area < imgArea * 0.0004 || area > imgArea * 0.08) { cnt.delete(); continue; }
    const peri = cv.arcLength(cnt, true);
    const approx = new cv.Mat();
    cv.approxPolyDP(cnt, approx, 0.04 * peri, true);
    if (approx.rows >= 4 && approx.rows <= 6) {
      const rect = cv.boundingRect(cnt);
      const ar = rect.width / (rect.height || 1);
      if (ar > 0.65 && ar < 1.45) {
        candidates.push({
          x: rect.x + rect.width / 2,
          y: rect.y + rect.height / 2,
          area
        });
      }
    }
    approx.delete();
    cnt.delete();
  }
  contours.delete();
  hierarchy.delete();
  if (candidates.length < 4) return null;

  const corners = [
    { id: 'tl', x: 0, y: 0 },
    { id: 'tr', x: w, y: 0 },
    { id: 'br', x: w, y: h },
    { id: 'bl', x: 0, y: h }
  ];
  const picked = [];
  const used = new Set();
  corners.forEach(corner => {
    let best = null;
    let bestD = Infinity;
    candidates.forEach((c, idx) => {
      if (used.has(idx)) return;
      const d = dist2(c, corner);
      if (d < bestD) { bestD = d; best = { ...c, idx }; }
    });
    if (best) { used.add(best.idx); picked.push({ x: best.x, y: best.y }); }
  });
  if (picked.length < 4) return null;
  return orderCorners(picked);
};

const findPaperQuadFallback = (cv, binary, w, h) => {
  const contours = new cv.MatVector();
  const hierarchy = new cv.Mat();
  cv.findContours(binary, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
  let best = null;
  let bestArea = 0;
  for (let i = 0; i < contours.size(); i++) {
    const cnt = contours.get(i);
    const area = cv.contourArea(cnt);
    if (area < w * h * 0.15) { cnt.delete(); continue; }
    const peri = cv.arcLength(cnt, true);
    const approx = new cv.Mat();
    cv.approxPolyDP(cnt, approx, 0.02 * peri, true);
    if (approx.rows === 4 && area > bestArea) {
      bestArea = area;
      const pts = [];
      for (let j = 0; j < 4; j++) pts.push({ x: approx.data32S[j * 2], y: approx.data32S[j * 2 + 1] });
      best = orderCorners(pts);
    }
    approx.delete();
    cnt.delete();
  }
  contours.delete();
  hierarchy.delete();
  return best;
};

const countBubbleFill = (mat, cx, cy, r) => {
  const x0 = Math.max(0, Math.floor(cx - r));
  const y0 = Math.max(0, Math.floor(cy - r));
  const x1 = Math.min(mat.cols - 1, Math.ceil(cx + r));
  const y1 = Math.min(mat.rows - 1, Math.ceil(cy + r));
  let dark = 0;
  let total = 0;
  const data = mat.data;
  const cols = mat.cols;
  for (let y = y0; y <= y1; y++) {
    for (let x = x0; x <= x1; x++) {
      const dx = x - cx;
      const dy = y - cy;
      if (dx * dx + dy * dy > r * r) continue;
      total++;
      if (data[y * cols + x] > 128) dark++; /* BINARY_INV: бөглөсөн = цагаан */
    }
  }
  return total ? dark / total : 0;
};

const readBubblesFromWarped = (cv, warpedGray) => {
  const answers = {};
  const fills = {};
  for (let q = 0; q < OMR_Q_COUNT; q++) {
    const yNorm = OMR_ROW_Y0 + ((q + 0.5) / OMR_Q_COUNT) * (OMR_ROW_Y1 - OMR_ROW_Y0);
    const cy = yNorm * OMR_SHEET_H;
    let best = null;
    let bestFill = 0;
    const rowFills = {};
    OMR_OPTS.forEach((opt, oi) => {
      const cx = OMR_BUBBLE_X[oi] * OMR_SHEET_W;
      const r = OMR_BUBBLE_R * OMR_SHEET_W;
      const fill = countBubbleFill(warpedGray, cx, cy, r);
      rowFills[opt] = fill;
      if (fill > bestFill) { bestFill = fill; best = opt; }
    });
    fills[q + 1] = rowFills;
    if (bestFill >= 0.28) answers[q + 1] = best;
  }
  return { answers, fills };
};

const processOMRFrame = (cv, sourceCanvas) => {
  const src = cv.imread(sourceCanvas);
  const gray = new cv.Mat();
  cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
  const blurred = new cv.Mat();
  cv.GaussianBlur(gray, blurred, new cv.Size(5, 5), 0);
  const binary = new cv.Mat();
  cv.adaptiveThreshold(blurred, binary, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 11, 8);

  let corners = findCornerMarkers(cv, binary, gray.cols, gray.rows);
  if (!corners) corners = findPaperQuadFallback(cv, binary, gray.cols, gray.rows);
  if (!corners) {
    src.delete(); gray.delete(); blurred.delete(); binary.delete();
    return { ok: false, error: '4 өнцгийн маркер олдсонгүй. Цаасыг бүрэн харуулна уу.' };
  }

  const srcPts = cv.matFromArray(4, 1, cv.CV_32FC2, [
    corners.tl.x, corners.tl.y,
    corners.tr.x, corners.tr.y,
    corners.br.x, corners.br.y,
    corners.bl.x, corners.bl.y
  ]);
  const dstPts = cv.matFromArray(4, 1, cv.CV_32FC2, [
    0, 0, OMR_SHEET_W, 0, OMR_SHEET_W, OMR_SHEET_H, 0, OMR_SHEET_H
  ]);
  const M = cv.getPerspectiveTransform(srcPts, dstPts);
  const warped = new cv.Mat();
  cv.warpPerspective(gray, warped, M, new cv.Size(OMR_SHEET_W, OMR_SHEET_H));
  const warpedBin = new cv.Mat();
  cv.adaptiveThreshold(warped, warpedBin, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 15, 10);

  const { answers, fills } = readBubblesFromWarped(cv, warpedBin);

  const preview = document.createElement('canvas');
  preview.width = OMR_SHEET_W;
  preview.height = OMR_SHEET_H;
  cv.imshow(preview, warpedBin);
  const previewDataUrl = preview.toDataURL('image/png');

  warpedBin.delete();
  src.delete(); gray.delete(); blurred.delete(); binary.delete();
  srcPts.delete(); dstPts.delete(); M.delete(); warped.delete();

  return { ok: true, answers, fills, previewDataUrl };
};

const gradeOMRAnswers = (answers, answerKey) => {
  let correct = 0;
  const detail = {};
  for (let q = 1; q <= OMR_Q_COUNT; q++) {
    const expected = (answerKey[q] || '').toUpperCase();
    const got = (answers[q] || '').toUpperCase();
    const ok = expected && got === expected;
    if (ok) correct++;
    detail[q] = { expected, got, ok };
  }
  const total = OMR_Q_COUNT;
  const score = Math.round((correct / total) * 100);
  return { correct, total, score, detail };
};

// ─── AI PARSER (Groq) ─────────────────────────────────────────────────────────
const parseTestWithAI = async (rawText, apiKey) => {
  const sys = `You are an exam question parser. Parse the multiple-choice questions from the given text and return ONLY a valid JSON array. Nothing else — no markdown, no explanation, just the JSON array.

Schema for each item:
{
  "id": <number, 1-based>,
  "text": "<question text, use ________ for blanks>",
  "options": [
    {"key": "A", "text": "<option text>"},
    {"key": "B", "text": "<option text>"},
    {"key": "C", "text": "<option text>"},
    {"key": "D", "text": "<option text>"}
  ],
  "answer": "<correct key letter like A/B/C/D, or null if not marked>"
}

Rules:
- Normalize any format to the schema above
- Clean up whitespace and formatting
- If a question has a marked answer (asterisk, ✓, (correct), etc.), capture it
- Always include exactly 4 options per question; if missing, create plausible distractors
- Return ONLY the JSON array`;

  const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${apiKey}`
    },
    body: JSON.stringify({
      model: 'llama-3.3-70b-versatile',
      max_tokens: 4096,
      messages: [
        { role: 'system', content: sys },
        { role: 'user', content: rawText }
      ]
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${response.status}`);
  }
  const data = await response.json();
  const text = data.choices?.[0]?.message?.content?.trim() || '';
  const clean = text.replace(/^```(?:json)?\n?/, '').replace(/\n?```$/, '').trim();
  return JSON.parse(clean);
};

          ⚠️ API түлхүүр оруулаагүй — AI задлан шинжилгээ ажиллахгүй.
          <button className="btn btn-outline btn-sm" onClick={() => alert('Дээрх ⚙ Тохиргоо товчоор API key оруулна уу')}>Тохиргоо</button>
        </div>
      )}

      {parsing ? (
        <div className="parsing-overlay">
          <div className="spinner"></div>
          <div style={{fontFamily:'Outfit',fontWeight:700,fontSize:'1.1rem',marginBottom:8}}>AI задлан шинжилж байна... (Хувилбар {vLabel})</div>
          <div style={{fontSize:'0.85rem',color:'var(--text2)'}}>Тестийн асуулт, хариултуудыг автоматаар таних</div>
        </div>
      ) : (
        <>
          <div className="form-group">
            <label className="form-label">Хувилбар {vLabel} — Тестийн текст</label>
            <textarea
              className="form-textarea"
              style={{minHeight:240,fontFamily:'monospace',fontSize:'0.82rem'}}
              placeholder={`Хувилбар ${vLabel}-н тестийн текстийг энд paste хийнэ үү...\n\n1. The police ________ the thief...\n* A) catched\n* B) caught\n* C) caughted\n* D) had catch\n...`}
              value={raw}
              onChange={e => setRaw(e.target.value)}
            />
            {err && <div className="form-error">⚠ {err}</div>}
          </div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}}>
            <button className="btn btn-outline" onClick={onBack}>← Буцах</button>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-outline" onClick={onManual}>✏ Гараар оруулах</button>
              <button className="btn btn-violet" onClick={doParse} disabled={!raw.trim() || !apiKey}>
                ✨ AI задлан шинжлэх (Хувилбар {vLabel})
              </button>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

// ─── QUESTION EDITOR ──────────────────────────────────────────────────────────
function QuestionEditor({ questions, onChange }) {
  const setQ = (idx, field, val) => {
    const next = questions.map((q, i) => i === idx ? {...q, [field]: val} : q);
    onChange(next);
  };
  const setOpt = (qi, oi, val) => {
    const next = questions.map((q, i) => {
      if (i !== qi) return q;
      const opts = q.options.map((o, j) => j === oi ? {...o, text: val} : o);
      return {...q, options: opts};
    });
    onChange(next);
  };
  const addQ = () => {
    onChange([...questions, {
      id: questions.length + 1,
      text: '',
      options: [{key:'A',text:''},{key:'B',text:''},{key:'C',text:''},{key:'D',text:''}],
      answer: null
    }]);
  };
  const removeQ = idx => onChange(questions.filter((_, i) => i !== idx));

  return (
    <div>
      {questions.map((q, qi) => (
        <div className="question-item" key={qi} style={{marginBottom:16}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
            <span className="q-num">#{q.id}</span>
            <button className="btn btn-red btn-sm" onClick={() => removeQ(qi)}>✕ Устгах</button>
          </div>
          <textarea
            className="form-textarea"
            style={{minHeight:60,fontSize:'0.875rem',marginBottom:10}}
            placeholder="Асуултын текст..."
            value={q.text}
            onChange={e => setQ(qi, 'text', e.target.value)}
          />
          <div className="options-grid" style={{marginBottom:10}}>
            {q.options.map((opt, oi) => (
              <div key={opt.key} style={{display:'flex',gap:7,alignItems:'center'}}>
                <div className="option-key" style={{background: q.answer===opt.key ? 'var(--green)' : undefined, color: q.answer===opt.key ? 'white' : undefined, border: q.answer===opt.key ? '1.5px solid var(--green)' : undefined}}>{opt.key}</div>
                <input
                  className="form-input"
                  style={{flex:1,padding:'6px 10px',fontSize:'0.82rem'}}
                  placeholder={`${opt.key} хариулт...`}
                  value={opt.text}
                  onChange={e => setOpt(qi, oi, e.target.value)}
                />
              </div>
            ))}
          </div>
          <div className="answer-select-row">
            <span className="answer-label">Зөв хариулт:</span>
            {q.options.map(opt => (
              <button
                key={opt.key}
                className={`ans-btn ${q.answer === opt.key ? 'selected' : ''}`}
                onClick={() => setQ(qi, 'answer', q.answer === opt.key ? null : opt.key)}
              >{opt.key}</button>
            ))}
            {!q.answer && <span style={{fontSize:'0.75rem',color:'var(--text3)',marginLeft:6}}>— оноогүй</span>}
          </div>
        </div>
      ))}
      <button className="btn btn-outline" style={{width:'100%',justifyContent:'center',padding:'11px'}} onClick={addQ}>
        + Асуулт нэмэх
      </button>
    </div>
  );
}

// ─── CREATE EXAM ──────────────────────────────────────────────────────────────
function CreateExam({ apiKey, onSave, onCancel }) {
  const [step, setStep] = useState(1); // 1=info, 2=parse, 3=review
  const [info, setInfo] = useState({ title: '', subject: 'Англи хэл', duration: 45, passingScore: 60 });
  const [variants, setVariants] = useState([{ label: 'A', questions: [] }]);
  const [activeVar, setActiveVar] = useState(0);
  const [saving, setSaving] = useState(false);
  const [showInlineAI, setShowInlineAI] = useState(false);
  const [inlineRaw, setInlineRaw] = useState('');
  const [inlineParsing, setInlineParsing] = useState(false);
  const [inlineErr, setInlineErr] = useState('');
  const variantCount = variants.length;

  const stepLabels = ['Мэдээлэл', 'Тест оруулах', 'Хянах & нийтлэх'];

  const handleParsed = qs => {
    setVariants(prev => prev.map((v, idx) => idx === activeVar ? ({...v, questions: qs}) : v));
    setStep(3);
  };

  const handleManual = () => {
    const seed = [{id:1,text:'',options:[{key:'A',text:''},{key:'B',text:''},{key:'C',text:''},{key:'D',text:''}],answer:null}];
    setVariants(prev => prev.map((v, idx) => idx === activeVar ? ({...v, questions: seed}) : v));
    setStep(3);
  };

  const addVariant = () => {
    setVariants(prev => {
      const nextIdx = prev.length;
      if (nextIdx >= 5) return prev;
      return [...prev, { label: alpha(nextIdx), questions: [] }];
    });
    setActiveVar(v => Math.min(v + 1, 4));
  };

  // Go to next variant (create if needed), hide current questions
  const goNextVariant = () => {
    const nextIdx = activeVar + 1;
    if (nextIdx >= 5) return;
    setVariants(prev => {
      const cleared = prev.map((v, idx) =>
        idx === activeVar ? { ...v, questions: [] } : v
      );
      if (nextIdx >= cleared.length) {
        return [...cleared, { label: alpha(nextIdx), questions: [] }];
      }
      return cleared.map((v, idx) =>
        idx === nextIdx ? { ...v, questions: [] } : v
      );
    });
    setActiveVar(nextIdx);
    setShowInlineAI(false);
    setInlineRaw('');
    setInlineErr('');
  };

  // Inline AI parse for current variant (in step 3)
  const doInlineParse = async () => {
    if (!inlineRaw.trim()) return;
    if (!apiKey) { setInlineErr('API түлхүүр байхгүй'); return; }
    setInlineParsing(true); setInlineErr('');
    try {
      const qs = await parseTestWithAI(inlineRaw, apiKey);
      if (!Array.isArray(qs) || qs.length === 0) throw new Error('Асуулт илрэхгүй байна');
      setVariants(prev => prev.map((v, idx) => idx === activeVar ? ({...v, questions: qs}) : v));
      setShowInlineAI(false);
      setInlineRaw('');
    } catch (e) {
      setInlineErr('Алдаа: ' + e.message);
    } finally {
      setInlineParsing(false);
    }
  };

  const handlePublish = () => {
    const hasAny = variants.some(v => (v.questions || []).some(q => (q.text || '').trim()));
    if (!hasAny) { alert('Дор хаяж нэг асуулт оруулна уу'); return; }
    setSaving(true);
    setTimeout(() => {
      const normalizedVariants = variants.map((v, vidx) => {
        const valid = (v.questions || []).filter(q => (q.text || '').trim());
        const normalizedQs = valid.map((q, i) => ({...q, id: i + 1}));
        return { label: v.label || alpha(vidx), questions: normalizedQs };
      }).filter(v => v.questions.length > 0);
      const exam = {
        id: uid(),
        ...info,
        variants: normalizedVariants.length ? normalizedVariants : [{ label: 'A', questions: [] }],
        createdAt: new Date().toISOString(),
        published: true,
        submissionCount: 0
      };

      // Publish room to Firebase (activeRooms/{roomID})
      const db = getDb();
      if (db) {
        try {
          const versions = {};
          exam.variants.forEach((v) => { versions[v.label] = packQuestions(v.questions); });
          roomRef(db, exam.id).set({
            roomID: exam.id,
            title: exam.title,
            subject: exam.subject,
            duration: exam.duration,
            passingScore: exam.passingScore,
            createdAt: exam.createdAt,
            versions
          });
        } catch {}
      }

      onSave(exam);
    }, 300);
  };

  const currentVariant = variants[activeVar] || { label: alpha(activeVar), questions: [] };
  const currentQCount = (currentVariant.questions || []).filter(q => q.text).length;
  const totalQCount = variants.reduce((sum, v) => sum + (v.questions||[]).filter(q=>q.text).length, 0);

  return (
    <div>
      <div className="page-header">
        <h2 className="page-title">✏ Шинэ тест үүсгэх</h2>
      </div>

      {/* Steps */}
      <div className="steps mb-4">
        {stepLabels.map((lbl, i) => (
          <React.Fragment key={i}>
            <div className={`step ${step === i+1 ? 'active' : step > i+1 ? 'done' : ''}`}>
              <div className="step-num">{step > i+1 ? '✓' : i+1}</div>
              <span>{lbl}</span>
            </div>
            {i < stepLabels.length - 1 && <div className="step-line" />}
          </React.Fragment>
        ))}
      </div>

      <div className="card">
        <div className="card-body">
          {step === 1 && (
            <div>
              <div className="form-row">
                <div className="form-group">
                  <label className="form-label">Шалгалтын нэр</label>
                  <input className="form-input" placeholder="жн: Simple Past Tense" value={info.title} onChange={e => setInfo(p => ({...p, title: e.target.value}))} />
                </div>
                <div className="form-group">
                  <label className="form-label">Хичээл</label>
                  <input className="form-input" placeholder="жн: Англи хэл" value={info.subject} onChange={e => setInfo(p => ({...p, subject: e.target.value}))} />
                </div>
              </div>
              <div className="form-row">
                <div className="form-group">
                  <label className="form-label">Хугацаа (минут)</label>
                  <input className="form-input" type="number" min="5" max="180" value={info.duration} onChange={e => setInfo(p => ({...p, duration: +e.target.value}))} />
                </div>
                <div className="form-group">
                  <label className="form-label">Тэнцэх онооны босго (%)</label>
                  <input className="form-input" type="number" min="0" max="100" value={info.passingScore} onChange={e => setInfo(p => ({...p, passingScore: +e.target.value}))} />
                </div>
              </div>
              <div style={{background:'var(--violet-light)',border:'1.5px solid #ddd6fe',borderRadius:10,padding:'12px 16px',marginBottom:16,fontSize:'0.83rem',color:'#5b21b6'}}>
                🎯 <strong>Олон хувилбарт шалгалт</strong> — Дараагийн алхамд хувилбар бүрт (A, B, C...) тусдаа асуулт оруулах боломжтой.
                Сурагч бүрд систем санамсаргүйгээр нэг хувилбар онооно.
              </div>
              <div style={{display:'flex',justifyContent:'space-between',marginTop:8}}>
                <button className="btn btn-outline" onClick={onCancel}>Болих</button>
                <button className="btn btn-primary" onClick={() => setStep(2)} disabled={!info.title.trim()}>Дараах →</button>
              </div>
            </div>
          )}

          {step === 2 && (
            <AIParseStep
              apiKey={apiKey}
              onParsed={handleParsed}
              onManual={handleManual}
              onBack={() => setStep(1)}
              variantCount={variantCount}
              onVariantCountChange={addVariant}
              currentVariantLabel={currentVariant.label || alpha(activeVar)}
            />
          )}

          {step === 3 && (
            <div>
              {/* ─── PROMINENT VERSION INDICATOR ─── */}
              <div className="version-indicator">
                <div className="version-indicator-icon">{currentVariant.label || alpha(activeVar)}</div>
                <div className="version-indicator-text">
                  <div className="version-indicator-label">
                    Одоо Хувилбар {currentVariant.label || alpha(activeVar)}-г бөглөж байна
                  </div>
                  <div className="version-indicator-sub">
                    {activeVar + 1}/{variantCount} хувилбар &nbsp;·&nbsp;
                    {currentQCount} асуулт оруулсан &nbsp;·&nbsp;
                    Нийт {totalQCount} асуулт ({variants.length} хувилбар)
                  </div>
                </div>
                <div style={{display:'flex',gap:8,flexShrink:0}}>
                  {!showInlineAI && apiKey && (
                    <button className="btn btn-outline btn-sm" onClick={() => setShowInlineAI(true)} title="AI-аар энэ хувилбарын асуулт үүсгэх">
                      ✨ AI
                    </button>
                  )}
                  {activeVar < variantCount - 1 ? (
                    <button className="btn btn-sm" style={{background:'var(--violet)',color:'white'}} onClick={() => setActiveVar(activeVar + 1)}>
                      {alpha(activeVar + 1)} хувилбар →
                    </button>
                  ) : variantCount < 5 ? (
                    <button className="version-next-btn btn-sm" onClick={goNextVariant}>
                      ➕ Дараагийн хувилбар
                    </button>
                  ) : null}
                </div>
              </div>

              {/* ─── VARIANT TAB STRIP ─── */}
              <div className="version-tab-strip">
                <span style={{fontSize:'0.75rem',fontWeight:700,color:'var(--text3)',alignSelf:'center',marginRight:4}}>ХУВИЛБАР:</span>
                {variants.map((v, idx) => (
                  <button
                    key={idx}
                    className={`version-tab ${idx === activeVar ? 'active' : ''}`}
                    onClick={() => { setActiveVar(idx); setShowInlineAI(false); setInlineRaw(''); setInlineErr(''); }}
                  >
                    {v.label || alpha(idx)}
                    <span className="vtab-count">{(v.questions||[]).filter(q=>q.text).length}</span>
                  </button>
                ))}
                {variantCount < 5 && (
                  <button
                    style={{padding:'5px 12px',borderRadius:20,border:'1.5px dashed var(--border)',background:'transparent',color:'var(--text3)',fontSize:'0.78rem',cursor:'pointer',fontWeight:600}}
                    onClick={addVariant}
                    title="Хувилбар нэмэх"
                  >
                    ➕ нэмэх
                  </button>
                )}
                <div style={{marginLeft:'auto',display:'flex',gap:8,alignItems:'center'}}>
                  <button className="btn btn-outline btn-sm" onClick={() => setStep(2)}>← AI задлах</button>
                  <button className="btn btn-green btn-sm" onClick={handlePublish} disabled={saving}>
                    {saving ? '⏳ ...' : '🚀 Нийтлэх'}
                  </button>
                </div>
              </div>

              {/* ─── INLINE AI PARSE PANEL ─── */}
              {showInlineAI && (
                <div className="inline-ai-panel">
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                    <div style={{fontFamily:'Outfit',fontWeight:700,fontSize:'0.95rem',color:'#4c1d95'}}>
                      ✨ AI задлан шинжлэх — Хувилбар {currentVariant.label || alpha(activeVar)}
                    </div>
                    <button className="btn btn-ghost btn-sm" onClick={() => { setShowInlineAI(false); setInlineRaw(''); setInlineErr(''); }}>✕</button>
                  </div>
                  {inlineParsing ? (
                    <div style={{textAlign:'center',padding:'24px 0'}}>
                      <div className="spinner" style={{margin:'0 auto 12px'}} />
                      <div style={{color:'var(--violet)',fontWeight:600}}>Хувилбар {currentVariant.label || alpha(activeVar)}-н асуулт задлан шинжилж байна...</div>
                    </div>
                  ) : (
                    <>
                      <textarea
                        className="form-textarea"
                        style={{minHeight:160,fontFamily:'monospace',fontSize:'0.82rem',marginBottom:10}}
                        placeholder={`Хувилбар ${currentVariant.label || alpha(activeVar)}-н тестийн текстийг paste хийнэ үү...`}
                        value={inlineRaw}
                        onChange={e => setInlineRaw(e.target.value)}
                      />
                      {inlineErr && <div className="form-error" style={{marginBottom:8}}>⚠ {inlineErr}</div>}
                      <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
                        <button className="btn btn-outline btn-sm" onClick={() => { setShowInlineAI(false); setInlineRaw(''); setInlineErr(''); }}>Болих</button>
                        <button className="btn btn-violet btn-sm" onClick={doInlineParse} disabled={!inlineRaw.trim() || !apiKey}>
                          ✨ Задлан шинжлэх
                        </button>
                      </div>
                    </>
                  )}
                </div>
              )}

              {/* ─── QUESTION EDITOR FOR CURRENT VARIANT ─── */}
              <div style={{marginBottom:12,padding:'8px 12px',background:'var(--surface2)',borderRadius:'var(--radius-sm)',fontSize:'0.8rem',color:'var(--text2)',border:'1px solid var(--border)'}}>
                ✏ <strong style={{color:'var(--text)'}}>Хувилбар {currentVariant.label || alpha(activeVar)}</strong>-н асуултуудыг доор засна уу.
                {variantCount > 1 && <span style={{marginLeft:8}}>Бусад хувилбарын асуулт харагдахгүй — дээрх табаас сонгоно.</span>}
              </div>
              <QuestionEditor
                questions={currentVariant.questions || []}
                onChange={(qs) => setVariants(prev => prev.map((v, idx) => idx === activeVar ? ({...v, questions: qs}) : v))}
              />

              {/* ─── BOTTOM NAV ─── */}
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:16,paddingTop:16,borderTop:'1px solid var(--border)'}}>
                <div style={{fontSize:'0.82rem',color:'var(--text2)'}}>
                  {variants.map((v,idx) => (
                    <span key={idx} style={{marginRight:12,fontWeight: idx===activeVar ? 700 : 400, color: idx===activeVar ? 'var(--violet)' : 'var(--text3)'}}>

                <div style={{display:'flex',gap:10}}>
                  {activeVar > 0 && (
                    <button className="btn btn-outline btn-sm" onClick={() => setActiveVar(activeVar - 1)}>

                    </button>

            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── QR MODAL ─────────────────────────────────────────────────────────────────
function QRModal({ exam, onClose }) {
  const [step, setStep] = useState('confirm'); // confirm | addClass | qr
  const [classInput, setClassInput] = useState('');
  const [activeClassKey, setActiveClassKey] = useState('');
  const [classList, setClassList] = useState([]); // [{key,name}]
  const [savingClass, setSavingClass] = useState(false);
  const qrRef = useRef(null);
  const [joins, setJoins] = useState([]);
  const [variantCounts, setVariantCounts] = useState(null);
  const channelRef = useRef(null);
  const variantLabels = useMemo(() => getExamVariantLabels(exam), [exam]);
  const activeClassName = useMemo(() => {
    const hit = classList.find(c => c.key === activeClassKey);
    return hit?.name || displayClassName(activeClassKey, activeClassKey);
  }, [classList, activeClassKey]);

  const matchClass = useCallback((payload) => {
    if (!activeClassKey) return true;
    if (payload?.classKey) return payload.classKey === activeClassKey;
    const clsRaw = typeof payload === 'string' ? payload : (payload?.cls || '');
    const k = normalizeClassKey(clsRaw);
    return k === activeClassKey || (clsRaw || '').trim() === activeClassName;
  }, [activeClassKey, activeClassName]);

  const addJoin = useCallback((payload, id) => {
    if (!payload?.name || !matchClass(payload)) return;
    setJoins(prev => {
      const key = id || (payload.name + '|' + (payload.cls || '') + '|' + (payload.at || ''));
      if (prev.some(p => p.id === key)) return prev;
      return [{ id: key, name: payload.name, cls: payload.cls || activeClassName, at: payload.at || Date.now() }, ...prev].slice(0, 30);
    });
  }, [matchClass, activeClassName]);

  // Firebase: бүртгэлтэй ангиуд + сүүлийн ангиар шууд QR
  useEffect(() => {
    if (!exam?.id) return;
    const db = getDb();
    const lastKey = (() => { try { return localStorage.getItem(lastQrClassStorageKey(exam.id)); } catch { return ''; } })();
    if (!db) {
      if (lastKey) {
        setActiveClassKey(lastKey);
        setClassList([{ key: lastKey, name: displayClassName(lastKey, lastKey) }]);
        setStep('qr');
      }
      return;
    }
    const ref = roomRef(db, exam.id).child('classes');
    const handler = ref.on('value', snap => {
      const val = snap.val() || {};
      const list = Object.entries(val).map(([key, v]) => ({
        key,
        name: (v && v.name) ? v.name : key
      })).sort((a, b) => a.name.localeCompare(b.name, 'mn'));
      setClassList(list);
      const pick = (lastKey && list.some(c => c.key === lastKey)) ? lastKey : (list[0]?.key || '');
      if (pick) {
        setActiveClassKey(pick);
        setStep('qr');
      }
    });
    return () => { try { ref.off('value', handler); } catch {} };
  }, [exam?.id]);

  const goQrForClass = useCallback(async (name) => {
    setSavingClass(true);
    try {
      const reg = await registerExamClass(exam.id, name);
      setActiveClassKey(reg.key);
      setClassInput('');
      setStep('qr');
    } catch (e) {
      alert(e.message || 'Алдаа');
    } finally {
      setSavingClass(false);
    }
  }, [exam?.id]);

  useEffect(() => {
    if (!exam?.id || !activeClassKey) return;
    try {
      const bc = new BroadcastChannel('se_join_' + exam.id + '_' + activeClassKey);
      channelRef.current = bc;
      bc.onmessage = (ev) => {
        if (ev?.data?.type === 'JOIN') addJoin(ev.data.payload, ev.data.payload?.id);
      };
      return () => { try { bc.close(); } catch {} };
    } catch {}
  }, [exam?.id, activeClassKey, addJoin]);

  useEffect(() => {
    if (!exam?.id || !activeClassKey) return;
    const db = getDb();
    if (!db) return;
    setJoins([]);
    try {
      const ref = roomRef(db, exam.id).child('joins').limitToLast(80);
      const onAdd = ref.on('child_added', snap => addJoin(snap.val(), snap.key));
      return () => { try { ref.off('child_added', onAdd); } catch {} };
    } catch {}
  }, [exam?.id, activeClassKey, addJoin]);

  useEffect(() => {
    if (!exam?.id || !activeClassKey || variantLabels.length < 2) { setVariantCounts(null); return; }
    const db = getDb();
    if (!db) return;
    try {
      const ref = roomRef(db, exam.id).child('variantAllocator').child(activeClassKey).child('counts');
      const handler = ref.on('value', snap => setVariantCounts(snap.val() || {}));
      return () => { try { ref.off('value', handler); } catch {} };
    } catch {}
  }, [exam?.id, activeClassKey, variantLabels.length]);

  useEffect(() => {
    if (step !== 'qr' || !qrRef.current || !activeClassKey) return;
    qrRef.current.innerHTML = '';
    try {
      const base = window.location.origin + window.location.pathname;
      const packed = packExamForQR(exam, activeClassKey);
      const data = LZString.compressToEncodedURIComponent(JSON.stringify(packed));
      const url = base + '#qr=' + data;
      new QRCode(qrRef.current, {
        text: url,
        width: 240, height: 240,
        colorDark: '#1e293b', colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.L
      });
    } catch(e) { qrRef.current.innerHTML = '<div style="color:red">QR үүсгэхэд алдаа гарлаа</div>'; }
  }, [step, activeClassKey, exam?.id]);

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{maxWidth:480}}>
        {step === 'confirm' ? (
          <>
            <div className="modal-head">
              <div style={{fontFamily:'Outfit',fontWeight:800,fontSize:'1.1rem'}}>📱 QR код үүсгэх</div>
            </div>
            <div className="modal-body">
              <div style={{fontSize:'0.95rem',marginBottom:12}}>
                <strong>"{exam.title}"</strong> шалгалтын QR кодыг үүсгэх үү?
              </div>
              <div style={{fontSize:'0.85rem',color:'var(--text2)',lineHeight:1.7,marginBottom:16}}>
                Сурагчид QR уншуулахад зөвхөн <strong>нэр</strong> бичнэ.<br/>
                Ангиа багш энд томилно.
              </div>
              <div className="form-group">
                <label className="form-label">Ангийн нэр</label>
                <input
                  className="form-input"
                  placeholder="жн: 7а, 8б, 9а"
                  value={classInput}
                  onChange={e => setClassInput(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && classInput.trim() && goQrForClass(classInput)}
                  autoFocus
                />
              </div>
            </div>
            <div className="modal-foot">
              <button className="btn btn-outline" onClick={onClose}>Болих</button>
              <button
                className="btn btn-primary"
                disabled={!classInput.trim() || savingClass}
                onClick={() => goQrForClass(classInput)}
              >
                {savingClass ? '⏳ ...' : '✓ Тийм, үүсгэх'}
              </button>
            </div>
          </>
        ) : step === 'addClass' ? (
          <>
            <div className="modal-head">
              <div style={{fontFamily:'Outfit',fontWeight:800,fontSize:'1.1rem'}}>➕ Өөр анги</div>
            </div>
            <div className="modal-body">
              <div style={{fontSize:'0.85rem',color:'var(--text2)',marginBottom:14,lineHeight:1.6}}>
                Ижил шалгалтын материалаар өөр ангид QR үүсгэнэ (жн: 9а).
              </div>
              <div className="form-group">
                <label className="form-label">Ангийн нэр</label>
                <input
                  className="form-input"
                  placeholder="жн: 9а"
                  value={classInput}
                  onChange={e => setClassInput(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && classInput.trim() && goQrForClass(classInput)}
                  autoFocus
                />
              </div>
            </div>
            <div className="modal-foot">
              <button className="btn btn-outline" onClick={() => { setClassInput(''); setStep(activeClassKey ? 'qr' : 'confirm'); }}>Болих</button>
              <button className="btn btn-primary" disabled={!classInput.trim() || savingClass} onClick={() => goQrForClass(classInput)}>
                ✓ QR үүсгэх
              </button>
            </div>
          </>
        ) : (
          <>
            <div className="modal-head" style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12}}>
              <div>
                <div style={{fontFamily:'Outfit',fontWeight:800,fontSize:'1.1rem'}}>📱 {exam.title}</div>
                <div style={{fontSize:'0.8rem',color:'var(--text2)',marginTop:4}}>
                  <span style={{background:'var(--violet-light)',color:'var(--violet)',padding:'3px 10px',borderRadius:20,fontWeight:800}}>
                    {activeClassName} анги
                  </span>
                  {' '}· Сурагч зөвхөн нэрээ бичнэ
                </div>
              </div>
              <button className="btn btn-outline btn-sm" style={{flexShrink:0}} onClick={() => { setClassInput(''); setStep('addClass'); }}>
                Өөр анги
              </button>
            </div>
            <div className="modal-body" style={{textAlign:'center',padding:'28px 24px'}}>
              <div className="qr-wrap" style={{marginBottom:16}}>
                <div ref={qrRef} />
              </div>

              {classList.length > 1 && (
                <div style={{display:'flex',flexWrap:'wrap',gap:6,justifyContent:'center',marginBottom:12}}>
                  {classList.map(c => (
                    <button
                      key={c.key}
                      type="button"
                      className={`btn btn-sm ${c.key === activeClassKey ? 'btn-violet' : 'btn-outline'}`}
                      onClick={() => {
                        setActiveClassKey(c.key);
                        try { localStorage.setItem(lastQrClassStorageKey(exam.id), c.key); } catch {}
                        setJoins([]);
                      }}
                    >
                      {c.name}
                    </button>
                  ))}
                </div>
              )}

              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:10,margin:'0 auto 10px',maxWidth:360}}>
                <div style={{fontSize:'0.82rem',color:'var(--text2)',textAlign:'left'}}>
                  👥 {activeClassName} орсон: <strong style={{color:'var(--text)'}}>{joins.length}</strong>
                </div>
                <div style={{fontSize:'0.78rem',color:'var(--text3)'}}>Нэр бичсэн сурагчид</div>
              </div>

              {joins.length > 0 && (
                <div style={{maxWidth:360,margin:'0 auto 14px',textAlign:'left',border:'1px solid var(--border)',borderRadius:12,overflow:'hidden'}}>
                  {joins.slice(0, 8).map((j, idx) => (
                    <div key={idx} style={{display:'flex',justifyContent:'space-between',gap:10,padding:'8px 12px',background: idx % 2 ? 'var(--surface2)' : 'white'}}>
                      <div style={{fontWeight:700,fontSize:'0.85rem',color:'var(--text)'}}>{j.name}</div>
                    </div>
                  ))}
                </div>
              )}

              <div style={{fontSize:'0.82rem',color:'var(--text2)',marginTop:8}}>
                ❓ {(() => { const vs = exam?.versions; if (vs && typeof vs === 'object') { const v = Object.values(vs); return v.length > 0 ? (v[0]||[]).length : 0; } return (normalizeVariants(exam)[0]?.questions||[]).length; })()} асуулт &nbsp;·&nbsp; ⏱ {exam.duration} мин
                {variantLabels.length > 1 && <span style={{marginLeft:8,background:'var(--violet-light)',color:'var(--violet)',borderRadius:12,padding:'2px 8px',fontSize:'0.75rem',fontWeight:700}}>🎯 хувилбар тэнцүү</span>}
              </div>
              {variantLabels.length > 1 && (
                <div className="variant-stats-strip" style={{marginTop:12,justifyContent:'center'}}>
                  {variantLabels.map(vl => (
                    <span key={vl} className="variant-stat-chip">
                      <span className="chip-label">Хувилбар {vl}</span>
                      <strong>{variantCounts?.[vl] ?? 0}</strong>
                    </span>
                  ))}
                </div>
              )}
            </div>
            <div className="modal-foot">
              <button className="btn btn-primary" onClick={onClose}>Хаах</button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

function QRRoomLoader({ roomID, onLoaded, onBack }) {
  const [err, setErr] = useState('');
  useEffect(() => {
    const db = getDb();
    if (!db) { setErr('Firebase холболт алга'); return; }
    try {
      const ref = roomRef(db, roomID);
      ref.once('value')
        .then(snap => {
          const val = snap.val();
          if (!val || !val.versions) throw new Error('Room олдсонгүй');
          onLoaded(val);
        })
        .catch(e => setErr(e.message || 'Алдаа'));
    } catch(e) {
      setErr(e.message || 'Алдаа');
    }
  }, [roomID, onLoaded]);

  return (
    <div className="modal-overlay">
      <div className="modal" style={{maxWidth:420}}>
        <div className="modal-head">
          <div style={{fontFamily:'Outfit',fontWeight:800,fontSize:'1.1rem'}}>⏳ Room ачаалж байна...</div>
        </div>
        <div className="modal-body">
          {err ? (
            <div style={{color:'var(--red)',fontWeight:700}}>⚠ {err}</div>
          ) : (
            <div style={{color:'var(--text2)'}}>Шалгалтын мэдээллийг авч байна</div>
          )}
        </div>
        <div className="modal-foot">
          <button className="btn btn-outline" onClick={onBack}>← Буцах</button>
        </div>
      </div>
    </div>
  );
}

          {log.length === 0 ? (
            <div style={{textAlign:'center',padding:'24px',color:'var(--green)'}}>
              <div style={{fontSize:'2rem',marginBottom:8}}>✅</div>
              <div style={{fontWeight:700}}>Чит илрээгүй</div>

          ) : (
            <>
              <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:16}}>
                {Object.entries(counts).map(([type, cnt]) => {
                  const t = typeLabels[type] || {label:type,icon:'⚠'};
                  return (
                    <span key={type} style={{background:'var(--red-light)',color:'var(--red)',padding:'4px 12px',borderRadius:20,fontSize:'0.78rem',fontWeight:700}}>
                      {t.icon} {t.label} × {cnt}

                    <div className="cheat-event" key={i}>
                      <span style={{fontSize:'1rem'}}>{t.icon}</span>

                        <div style={{fontWeight:600,color:'var(--text)'}}>{t.label}</div>
                        <div style={{color:'var(--text3)',fontSize:'0.75rem'}}>{new Date(e.time).toLocaleTimeString('mn-MN')}</div>

        </div>
        <div className="modal-foot">
          <button className="btn btn-primary" onClick={onClose}>Хаах</button>
        </div>
      </div>
    </div>
  );
}

                        <td><strong>{s.studentName}</strong></td>
                        <td>{s.studentClass || '—'}</td>
                        <td><span className="badge badge-violet" style={{fontFamily:'monospace',fontWeight:800,fontSize:'0.85rem'}}>{vlabel}</span></td>
                        <td>
                          <span style={{fontFamily:'Outfit',fontWeight:700,fontSize:'1rem',color: s.score >= exam.passingScore ? 'var(--green)' : 'var(--red)'}}>{s.score}%</span>
                          <div style={{color:'var(--text3)',fontSize:'0.75rem',marginTop:2}}>
                            {s.correctCount}/{s.totalCount}
                            {' · '}
                            <span style={{fontWeight:700,color: s.score >= exam.passingScore ? 'var(--green)' : 'var(--red)'}}>
                              {s.score >= exam.passingScore ? 'Тэнцсэн' : 'Тэнцээгүй'}
                            </span>
                          </div>
                        </td>
                        <td style={{fontFamily:'monospace',fontSize:'0.9rem',color:'var(--text2)'}}>{took}</td>
                        <td>
                          <span className={`cheat-pill ${pillCls}`} onClick={() => onCheatClick(s)}>
                            {cheatCnt === 0 ? '✓ Цэвэр' : `⚠ ${cheatCnt} удаа`}
                          </span>
                        </td>
                        <td style={{color:'var(--text3)',fontSize:'0.8rem'}}>{new Date(s.submittedAt).toLocaleString('mn-MN')}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        )}
      </div>
      {cheatSub && <CheatDetailModal sub={cheatSub} onClose={onCheatClose} />}
    </div>
  );
}
